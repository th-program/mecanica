<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Acesso</title>
    <style>
        :root { 
            --bg: #000814;
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary: #d4af37; 
            --primary-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f8f9fa; 
            --text-dim: #94a3b8;
            --border: rgba(212, 175, 55, 0.15); 
            --success: #10b981; 
            --danger: #ef4444; 
            --input-bg: #001226; 
            --radius: 16px;
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(212, 175, 55, 0.03) 0%, transparent 30%);
            color: var(--text-main); 
            display: flex; flex-direction: column; min-height: 100vh; padding: 20px; align-items: center; justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 30px; 
            border-radius: var(--radius); backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box { text-align: center; margin-bottom: 30px; } 
        .logo-img { width: 180px; filter: drop-shadow(0 0 10px var(--primary-glow)); } 
        
        label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; } 
        
        input, textarea { 
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 15px; transition: 0.3s; 
        } 
        
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px var(--primary-glow); }

        .btn-main { 
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); color: #000; 
            width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; font-size: 13px; transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(184, 150, 45, 0.2);
        }

        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        .toggle-mode {
            text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-dim);
        }

        .toggle-mode span {
            color: var(--primary); cursor: pointer; font-weight: bold; text-decoration: underline;
        }

        .btn-home-fixed {
            position: fixed; top: 20px; left: 20px; text-decoration: none; color: var(--text-dim);
            font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; z-index: 1000;
        }

        .hidden { display: none !important; }
        
        #custom-alert { 
            position: fixed; top: 20px; z-index: 9999; padding: 15px; border-radius: 10px; 
            color: white; font-weight: 600; display: none; width: 90%; max-width: 400px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .aviso-senha {
            background: rgba(212, 175, 55, 0.05); color: var(--text-dim); padding: 10px;
            border-radius: 10px; font-size: 11px; margin-bottom: 15px;
            border: 1px dotted var(--border); text-align: center;
        }
        .welcome-msg { color: var(--success); text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed">🏠 INÍCIO</a>
<div id="custom-alert"></div>

<div class="container">
    <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>

    <section id="view-login" class="card">
        <h2 id="titulo-acesso" style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:20px; letter-spacing: 1px;">FAÇA LOGIN</h2>
        
        <div id="campos-cadastro" class="hidden">
            <label>Nome Completo</label>
            <input type="text" id="c-nome" placeholder="Ex: João Silva">
            
            <label>WhatsApp (com DDD)</label>
            <input type="tel" id="c-zap" placeholder="11999999999">
        </div>

        <label>E-mail</label>
        <input type="email" id="c-email" placeholder="exemplo@email.com">

        <label>Sua Senha</label>
        <input type="password" id="c-pass" placeholder="••••••">
        
        <div class="aviso-senha">Protegemos seus dados com criptografia de ponta a ponta.</div>
        
        <button id="btn-acao" class="btn-main" onclick="processarAcesso()">ENTRAR NO SISTEMA</button>

        <div class="toggle-mode" id="container-toggle">
            Ainda não tem conta? <span onclick="alternarModo('cadastro')">Se cadastrar</span>
        </div>
    </section>

    <section id="view-veiculo" class="card hidden">
        <div id="msg-boas-vindas" class="welcome-msg"></div>
        <h2 style="color:var(--primary); font-size:16px; text-align:center; margin-bottom:20px;">DETALHES DO VEÍCULO</h2>
        
        <label>Placa</label>
        <input type="text" id="c-placa" maxlength="7" placeholder="ABC1D23" style="text-transform: uppercase; font-weight: 900; letter-spacing: 2px;">
        
        <label>Modelo do Veículo</label>
        <input type="text" id="c-modelo" placeholder="Ex: Honda Civic">

        <label>Ano do Veículo</label>
        <input type="text" id="c-ano" maxlength="4" placeholder="Ex: 2020">
        
        <label>O que está acontecendo?</label>
        <textarea id="c-problema" rows="4" placeholder="Descreva o problema..."></textarea>
        
        <button class="btn-main" onclick="finalizarCadastro()">ENVIAR PARA OFICINA</button>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer; font-size:11px;">VOLTAR PARA IDENTIFICAÇÃO</button>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dadosTemporariosCliente = {};
    let modoAtual = 'login'; // 'login' ou 'cadastro'

    function showAlert(msg, color = "#ef4444") {
        const div = document.getElementById('custom-alert');
        div.style.background = color;
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 3000);
    }

    function sanitizarEmail(email) {
        return email.replace(/\./g, '_').replace(/@/g, '_at_');
    }

    // ALTERNA ENTRE LOGIN E CADASTRO
    function alternarModo(novoModo) {
        modoAtual = novoModo;
        const camposCadastro = document.getElementById('campos-cadastro');
        const titulo = document.getElementById('titulo-acesso');
        const btn = document.getElementById('btn-acao');
        const toggleContainer = document.getElementById('container-toggle');

        if (novoModo === 'cadastro') {
            camposCadastro.classList.remove('hidden');
            titulo.innerText = "CRIAR NOVA CONTA";
            btn.innerText = "CADASTRAR E CONTINUAR";
            toggleContainer.innerHTML = 'Já possui conta? <span onclick="alternarModo(\'login\')">Fazer Login</span>';
        } else {
            camposCadastro.classList.add('hidden');
            titulo.innerText = "FAÇA LOGIN";
            btn.innerText = "ENTRAR NO SISTEMA";
            toggleContainer.innerHTML = 'Ainda não tem conta? <span onclick="alternarModo(\'cadastro\')">Se cadastrar</span>';
        }
    }

    function processarAcesso() {
        const email = document.getElementById('c-email').value.trim().toLowerCase();
        const pass = document.getElementById('c-pass').value.trim();
        const emailChave = sanitizarEmail(email);

        if(!email || !pass) return showAlert("⚠️ PREENCHA E-MAIL E SENHA");

        if (modoAtual === 'login') {
            // LÓGICA DE LOGIN
            db.ref('usuarios/' + emailChave).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const dados = snapshot.val();
                    if(dados.senha === pass) {
                        dadosTemporariosCliente = { nome: dados.nome, zap: dados.zap, user: emailChave };
                        document.getElementById('msg-boas-vindas').innerText = `Bem-vindo de volta, ${dados.nome}!`;
                        mostrarTelaVeiculo();
                    } else {
                        showAlert("❌ SENHA INCORRETA");
                    }
                } else {
                    showAlert("❌ E-MAIL NÃO ENCONTRADO. CLIQUE EM SE CADASTRAR.");
                }
            });
        } else {
            // LÓGICA DE NOVO CADASTRO
            const nome = document.getElementById('c-nome').value.trim();
            const zap = document.getElementById('c-zap').value.replace(/\D/g, "");

            if(!nome || !zap) return showAlert("⚠️ PREENCHA TODOS OS CAMPOS PARA CADASTRO");

            db.ref('usuarios/' + emailChave).once('value').then((snapshot) => {
                if(snapshot.exists()) {
                    showAlert("⚠️ ESTE E-MAIL JÁ POSSUI CADASTRO.");
                } else {
                    db.ref('usuarios/' + emailChave).set({
                        nome: nome,
                        zap: zap,
                        senha: pass,
                        email: email
                    }).then(() => {
                        dadosTemporariosCliente = { nome, zap, user: emailChave };
                        document.getElementById('msg-boas-vindas').innerText = "Conta criada com sucesso!";
                        mostrarTelaVeiculo();
                    });
                }
            });
        }
    }

    function mostrarTelaVeiculo() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-veiculo').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function finalizarCadastro() {
        const placa = document.getElementById('c-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('c-modelo').value.trim();
        const ano = document.getElementById('c-ano').value.trim();
        const problema = document.getElementById('c-problema').value.trim();

        if(!placa || !modelo || !ano || !problema) return showAlert("⚠️ PREENCHA OS DADOS DO VEÍCULO");

        db.ref('servicos_ativos/' + placa).set({
            cliente_id: dadosTemporariosCliente.user,
            nome_cliente: dadosTemporariosCliente.nome, 
            zap_cliente: dadosTemporariosCliente.zap,   
            placa: placa,
            modelo: modelo,
            ano: ano,
            problema: problema,
            data: new Date().toLocaleString(),
            status: "Aguardando Avaliação"
        }).then(() => {
            showAlert("✔️ SOLICITAÇÃO ENVIADA COM SUCESSO!", "#10b981");
            setTimeout(() => { window.location.href = "index.html"; }, 2000);
        }).catch(() => showAlert("❌ ERRO AO SALVAR SOLICITAÇÃO"));
    }
</script>

</body>
</html>
