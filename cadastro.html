<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Sistema Integrado</title>
    <style>
        /* ESTILO COPIADO DO CÓDIGO ORIGINAL */
        :root { 
            --bg: #000b1a; 
            --primary: #d4af37; 
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: #132a47; 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 30, 61, 0.7); 
            --logo-size: 200px; 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 15px; 
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; } 
        section { display: block; animation: fadeIn 0.4s ease-out; width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { background: none; border: none; padding: 5px; position: relative; width: 100%; } 
        .logo-box { text-align: center; margin-bottom: 25px; padding: 10px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); } 
        
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; } 
        
        input, textarea { 
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; font-size: 16px !important; margin-bottom: 18px; transition: 0.3s; 
        } 
        
        input:focus { border-color: var(--primary); outline: none; background: rgba(0, 30, 61, 0.9); } 
        
        .input-placa-grande { font-family: 'Monaco', monospace; font-size: 32px !important; background: #fff !important; color: #000 !important; border: 4px solid var(--primary) !important; text-transform: uppercase; letter-spacing: 5px; text-align: center; border-radius: 15px !important; } 

        .btn-main { background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); color: #000; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.15); margin-top: 10px; display: block; text-decoration: none; text-align: center; } 

        .hidden { display: none !important; } 
        .aviso-senha { background: rgba(212, 175, 55, 0.1); color: var(--primary); padding: 10px; border-radius: 10px; font-size: 10px; margin-top: -12px; margin-bottom: 18px; border: 1px solid rgba(212, 175, 55, 0.2); text-align: center; font-weight: bold; }
        
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none; width: 80%; text-align: center; }
    </style>
</head>
<body>

<div id="custom-alert"></div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <div id="area-busca">
            <label>Consulte seu carro (Insira seu PIN)</label>
            <input type="password" id="login-pin" class="input-placa-grande" maxlength="4" placeholder="0000">
            <button class="btn-main" onclick="consultarCarro()">Localizar Veículo</button>
        </div>
        <div id="resultado-cliente"></div>
        <button id="btn-solicitar-cadastro" onclick="irPara('view-cadastro-cliente')" class="btn-main" style="background: #25d366; color: white; margin-top: 20px;">NOVA SOLICITAÇÃO (CADASTRO)</button>
        <button id="btn-voltar-busca" onclick="location.reload()" class="btn-main hidden" style="background: #132a47; color: white; margin-top: 10px;">VOLTAR PARA CONSULTA</button>
    </section>

    <section id="view-cadastro-cliente" class="card hidden">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:25px; letter-spacing: 2px;">NOVO CADASTRO</h2>
        
        <label>Nome Completo</label><input type="text" id="c-nome" placeholder="Seu nome">
        <label>WhatsApp</label><input type="tel" id="c-zap" placeholder="(00) 00000-0000">
        <label>Placa do Veículo</label><input type="text" id="c-placa" maxlength="7" placeholder="ABC1D23" style="text-transform: uppercase;">
        <label>Modelo do Veículo</label><input type="text" id="c-modelo" placeholder="Ex: Gol G5">
        <label>Ano do Veículo</label><input type="text" id="c-ano" maxlength="4" placeholder="Ex: 2012">
        <label>Problemas Apresentados</label><textarea id="c-problema" rows="4" placeholder="O que o carro tem?"></textarea>
        
        <label>Crie um PIN de 4 dígitos</label>
        <input type="password" id="c-pin" maxlength="4" placeholder="0000" style="text-align: center; font-size: 24px!important; letter-spacing: 10px;">
        <div class="aviso-senha">⚠️ ESTE PIN SERÁ USADO PARA VOCÊ CONSULTAR O STATUS DEPOIS.</div>

        <button class="btn-main" onclick="clienteEnviarCadastro()">ENVIAR PARA OFICINA</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:25px; cursor:pointer; font-size:14px; font-weight: bold;">← Voltar</button></center>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let bancoDados = {};

    // Sincronizar dados para consulta
    db.ref('veiculos').on('value', (snapshot) => {
        bancoDados = snapshot.val() || {};
    });

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function showAlert(msg) {
        const div = document.getElementById('custom-alert');
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 2500);
    }

    // FUNÇÃO PARA SALVAR NOVO CADASTRO
    function clienteEnviarCadastro() {
        const dados = {
            nome: document.getElementById('c-nome').value.trim(),
            zap: document.getElementById('c-zap').value.trim(),
            placa: document.getElementById('c-placa').value.toUpperCase().trim(),
            modelo: document.getElementById('c-modelo').value.trim(),
            ano: document.getElementById('c-ano').value.trim(),
            problema: document.getElementById('c-problema').value.trim(),
            pin: document.getElementById('c-pin').value.trim()
        };

        if(Object.values(dados).some(v => v === "")) return showAlert("❌ PREENCHA TODOS OS CAMPOS");
        if(dados.pin.length < 4) return showAlert("❌ O PIN DEVE TER 4 DÍGITOS");

        db.ref('pre_cadastros/' + dados.placa).set({
            ...dados,
            data: new Date().toLocaleString()
        }).then(() => {
            showAlert("✔️ CADASTRO ENVIADO COM SUCESSO!");
            irPara('view-cliente');
            // Limpar campos
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        }).catch(() => showAlert("❌ ERRO AO SALVAR"));
    }

    // FUNÇÃO PARA CONSULTAR USANDO O PIN CRIADO
    function consultarCarro() {
        const pinDigitado = document.getElementById('login-pin').value.trim();
        const res = document.getElementById('resultado-cliente');
        
        if(!pinDigitado) return showAlert("⚠️ DIGITE SEU PIN");

        let veiculo = Object.values(bancoDados).find(v => v.pin === pinDigitado);

        if(veiculo) {
            const corStatus = veiculo.status === "Pronto" ? "var(--success)" : "var(--warning)";
            res.innerHTML = `
                <div style="margin-top:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border);">
                    <h3 style="color:var(--primary)">${veiculo.modelo}</h3>
                    <p>Status: <b style="color:${corStatus}">${veiculo.status || 'Em Análise'}</b></p>
                    <p style="font-size:14px; margin:15px 0; line-height:1.4">${veiculo.obs || 'Aguardando início dos trabalhos.'}</p>
                    <p style="color:var(--success); font-weight:bold; font-size:18px">Total: R$ ${veiculo.preco || '0,00'}</p>
                </div>`;
            document.getElementById('area-busca').classList.add('hidden');
            document.getElementById('btn-solicitar-cadastro').classList.add('hidden');
            document.getElementById('btn-voltar-busca').classList.remove('hidden');
        } else {
            showAlert("🔍 PIN NÃO ENCONTRADO");
        }
    }
</script>

</body>
</html>
