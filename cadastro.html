<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Login e Cadastro</title>
    <style>
        :root { 
            --bg: #000b1a; 
            --primary: #d4af37; 
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: #132a47; 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 30, 61, 0.7); 
            --logo-size: 200px; 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        /* Ajuste no botão Início para não bloquear o clique */
        .btn-home-fixed {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .btn-home-fixed { position: fixed; top: 20px; left: 20px; margin-bottom: 0; }
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto;
            position: relative;
            z-index: 5;
        } 
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { background: none; border: none; padding: 5px; position: relative; width: 100%; animation: fadeIn 0.4s ease-out;} 

        .logo-box { text-align: center; margin-bottom: 25px; padding: 10px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); } 
        
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; } 
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px !important; 
            margin-bottom: 18px; 
            transition: 0.3s; 
            position: relative;
            z-index: 100;
        } 
        
        input:focus { border-color: var(--primary); outline: none; background: rgba(0, 30, 61, 0.9); } 
        
        .btn-main { 
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); 
            color: #000; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-weight: 900; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.2s; 
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.15); 
            margin-top: 10px; 
            display: block; 
            text-decoration: none; 
            text-align: center;
            position: relative;
            z-index: 200; /* Garante que o botão fique por cima de tudo */
        } 

        .hidden { display: none !important; } 

        .aviso-senha {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
            padding: 10px;
            border-radius: 10px;
            font-size: 10px;
            margin-top: -12px;
            margin-bottom: 18px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
            font-weight: bold;
        }

        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; text-align: center; }
        
        .welcome-msg { color: var(--success); text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed"><span>🏠</span> INÍCIO</a>

<div id="custom-alert"></div>

<div class="container">
    <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>

    <section id="view-login" class="card">
        <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:25px; letter-spacing: 2px;">CRIAR ACESSO</h2>
        
        <label>Nome Completo</label>
        <input type="text" id="c-nome" placeholder="Seu nome">
        
        <label>WhatsApp</label>
        <input type="tel" id="c-zap" placeholder="(00) 00000-0000">

        <label>Identificação (@ do usuário)</label>
        <input type="text" id="c-user" placeholder="@exemplo" style="text-transform: lowercase;">
        
        <label>Crie uma Senha</label>
        <input type="password" id="c-pass" placeholder="Sua senha">
        
        <div class="aviso-senha">Sua identificação e senha serão usadas para consultar seus serviços futuros.</div>

        <button type="button" class="btn-main" onclick="proximoPasso()">PRÓXIMO PASSO</button>
    </section>

    <section id="view-veiculo" class="card hidden">
        <div id="msg-boas-vindas" class="welcome-msg"></div>
        <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:25px; letter-spacing: 2px;">DADOS DO VEÍCULO</h2>
        
        <label>Placa do Veículo</label>
        <input type="text" id="c-placa" maxlength="7" placeholder="ABC1D23" style="text-transform: uppercase;">
        
        <label>Modelo do Veículo</label>
        <input type="text" id="c-modelo" placeholder="Ex: Gol G5">
        
        <label>Ano do Veículo</label>
        <input type="text" id="c-ano" maxlength="4" placeholder="Ex: 2012">
        
        <label>Problemas Apresentados</label>
        <textarea id="c-problema" rows="4" placeholder="O que o carro tem?"></textarea>
        
        <button type="button" class="btn-main" onclick="finalizarCadastro()">ENVIAR PARA OFICINA</button>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // Mantenha suas credenciais aqui
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usuarioAtual = null;

    function showAlert(msg, color = "#ff4d4d") {
        const div = document.getElementById('custom-alert');
        div.style.background = color;
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 2500);
    }

    function proximoPasso() {
        const nome = document.getElementById('c-nome').value.trim();
        const zap = document.getElementById('c-zap').value.trim();
        const user = document.getElementById('c-user').value.trim().toLowerCase().replace('@', '');
        const pass = document.getElementById('c-pass').value.trim();

        if(!nome || !zap || !user || !pass) {
            showAlert("❌ PREENCHA TODOS OS CAMPOS");
            return;
        }

        db.ref('usuarios/' + user).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const dados = snapshot.val();
                if(dados.senha === pass) {
                    usuarioAtual = user;
                    document.getElementById('msg-boas-vindas').innerText = `Bem vindo de volta, ${dados.nome}!`;
                    mostrarTelaVeiculo();
                } else {
                    showAlert("❌ SENHA INCORRETA");
                }
            } else {
                db.ref('usuarios/' + user).set({
                    nome, zap, senha: pass, identificador: "@" + user
                }).then(() => {
                    usuarioAtual = user;
                    document.getElementById('msg-boas-vindas').innerText = "Cadastro de perfil realizado!";
                    mostrarTelaVeiculo();
                });
            }
        }).catch((e) => {
            console.error(e);
            showAlert("❌ ERRO DE CONEXÃO");
        });
    }

    function mostrarTelaVeiculo() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-veiculo').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function finalizarCadastro() {
        const placa = document.getElementById('c-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('c-modelo').value.trim();
        const ano = document.getElementById('c-ano').value.trim();
        const problema = document.getElementById('c-problema').value.trim();

        if(!placa || !modelo || !ano || !problema) return showAlert("❌ PREENCHA OS DADOS DO CARRO");

        db.ref('servicos_ativos/' + placa).set({
            cliente_id: usuarioAtual,
            placa, modelo, ano, problema,
            data: new Date().toLocaleString(),
            status: "Aguardando Avaliação"
        }).then(() => {
            showAlert("✔️ ENVIADO COM SUCESSO!", "#00ff88");
            setTimeout(() => { location.reload(); }, 2000);
        }).catch(() => showAlert("❌ ERRO AO SALVAR"));
    }
</script>

</body>
</html>
