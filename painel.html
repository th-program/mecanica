<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg: #000814; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary: #d4af37; 
            --primary-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f8f9fa; 
            --text-dim: #94a3b8; 
            --border: rgba(212, 175, 55, 0.15); 
            --success: #10b981; 
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --input-bg: #001226; 
            --logo-size: 200px; 
            --radius: 16px;
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(212, 175, 55, 0.03) 0%, transparent 30%); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            padding: 10px;
            overflow-x: hidden; 
        }

        /* Botão Home */
        .btn-home-fixed {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            width: fit-content;
        }

        /* Layout Responsivo de Containers */
        .container { 
            width: 100%; 
            margin: 0 auto;
            transition: max-width 0.4s ease;
        } 

        /* Ajuste para Login (Sempre Estreito) */
        #view-cliente.card { max-width: 450px; margin: 0 auto; }

        /* Ajuste para o Painel (Dinâmico) */
        @media (min-width: 992px) { 
            .container-painel { max-width: 1200px !important; }
            #view-painel.card { padding: 40px; }
        }

        /* Animações */
        section { display: block; animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 20px;
            border-radius: var(--radius); 
            position: relative; 
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        } 

        .logo-box { text-align: center; margin-bottom: 30px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); height: auto; filter: drop-shadow(0 0 10px var(--primary-glow)); } 
        
        label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; } 
        
        input, textarea, select { 
            width: 100%; 
            padding: 14px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px; 
            margin-bottom: 15px; 
        } 

        .input-placa-grande { 
            font-family: 'Monaco', monospace; 
            font-size: 32px !important; 
            background: linear-gradient(to bottom, #fff, #cbd5e1) !important; 
            color: #0f172a !important; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            text-align: center; 
            font-weight: 900;
        } 

        .btn-main { 
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); 
            color: #000; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
        } 

        /* GRID DO PAINEL TÉCNICO */
        .painel-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
        } 

        @media (min-width: 992px) { 
            .painel-grid { 
                flex-direction: row; 
                align-items: flex-start; 
            } 
            .painel-col-esquerda { flex: 0 0 45%; } /* Lista e Filtros */
            .painel-col-direita { flex: 0 0 52%; }  /* Formulário de Edição */
        }

        /* Filtros e Tabelas */
        .categorias-filtro { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 15px; } 
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 16px; border-radius: 100px; font-size: 11px; white-space: nowrap; cursor: pointer; } 
        .cat-btn.active { background: var(--primary); color: #000; } 

        .status-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; } 
        .status-option { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px 4px; border-radius: 10px; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; color: var(--text-dim); } 
        .status-option.active { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.1); }

        .table-container { background: rgba(0,0,0,0.2); border-radius: 14px; border: 1px solid var(--border); overflow-x: auto; width: 100%; } 
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; } 
        
        /* Modal e Fotos */
        .fotos-grid { display: grid; gap: 8px; margin-top: 15px; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); } 
        .img-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; } 

        .hidden { display: none !important; } 
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 20px; border-radius: 10px; background: #1e293b; color: white; border-left: 4px solid var(--primary); font-size: 13px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 400px; text-align: center; }

        .solicitacao-item { background: rgba(212, 175, 55, 0.05); border: 1px solid var(--border); padding: 15px; border-radius: 14px; margin-bottom: 12px; }
        .tag-servico { font-size: 10px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 100px; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); margin-right: 5px; }

        #img-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; display: none; justify-content: center; align-items: center; } 
        #modal-view { max-width: 90%; max-height: 85%; border-radius: 10px; }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed"><span>🏠</span> VOLTAR AO INÍCIO</a>

<div id="custom-alert"></div>
<div id="img-modal" onclick="this.style.display='none'"><img id="modal-view" src=""></div>

<div class="container" id="main-container">
    
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img" alt="Lima Car Logo"></div>
        <div id="area-login">
            <label>Identificação de Acesso</label>
            <input type="text" id="login-user" placeholder="@seuusuario" oninput="verificarUsuarioMecanico(this.value)">
            
            <label>Senha de Segurança</label>
            <input type="password" id="login-pass" placeholder="••••">
            
            <div id="wrapper-placa" class="hidden">
                <label>Placa do Veículo</label>
                <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1234">
            </div>

            <button class="btn-main" onclick="gerenciarLogin()">Acessar Sistema</button>
        </div>
        <div id="resultado-cliente"></div>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h2 style="font-size:16px; color:var(--primary); letter-spacing: 1px;">PAINEL TÉCNICO</h2>
            <button onclick="location.reload()" style="color:var(--danger); background:none; border:1px solid var(--danger); padding: 5px 15px; border-radius: 8px; cursor:pointer; font-weight: bold;">SAIR</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col-esquerda">
                <label style="color:var(--success); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 18px;">📩</span> Novas Solicitações
                </label>
                <div id="lista-solicitacoes"></div>
                
                <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
                    <div class="categorias-filtro">
                        <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                        <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Fila</button>
                        <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                        <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="corpo-tabela"></table>
                </div>
            </div>

            <div class="painel-col-direita">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><label>Placa</label><input type="text" id="m-placa" readonly style="opacity: 0.6;"></div>
                    <div><label>Total (R$)</label><input type="text" id="m-preco" placeholder="0,00" oninput="mascaraMoeda(this)"></div>
                </div>
                
                <label>Veículo</label>
                <input type="text" id="m-modelo" readonly style="opacity: 0.6;">
                <input type="hidden" id="m-identificacao-interna">

                <label>Fotos da Ordem</label>
                <button class="btn-main" style="background: rgba(255,255,255,0.05); border: 2px dashed var(--border); color: var(--primary); margin-bottom: 15px;" onclick="document.getElementById('m-fotos-input').click()">
                    📸 CLIQUE PARA ENVIAR FOTOS
                </button>
                <input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()" style="display: none;">
                <div id="preview-area" class="fotos-grid"></div>

                <label style="margin-top: 15px;">Status da Manutenção</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Mão na Massa</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                </div>

                <label>Relatório Técnico</label>
                <div style="margin-bottom: 10px;">
                    <span class="tag-servico" onclick="addServico('Revisão')">+ Revisão</span>
                    <span class="tag-servico" onclick="addServico('Troca de Óleo')">+ Óleo</span>
                    <span class="tag-servico" onclick="addServico('Scanner')">+ Scanner</span>
                </div>
                <textarea id="m-obs" rows="5" placeholder="Descreva o que foi feito no carro..."></textarea>
                
                <button class="btn-main" onclick="salvar()">✅ SALVAR REGISTRO</button>
            </div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
        messagingSenderId: "COLE_AQUI",
        appId: "COLE_AQUI"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let statusSelecionado = "Aguardando";
    let bancoDados = {}; 
    let fotosBase64 = [];

    // Lógica de Login e Troca de View
    function verificarUsuarioMecanico(valor) {
        const wrapper = document.getElementById('wrapper-placa');
        if (valor.toLowerCase().includes('adm')) wrapper.classList.add('hidden');
        else wrapper.classList.remove('hidden');
    }

    function gerenciarLogin() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        
        if(user === "@adm.limacar" && pass === "1234") {
            // MUDANÇA PARA LAYOUT DE PC
            document.getElementById('main-container').classList.add('container-painel');
            irPara('view-painel');
        } else {
            showAlert("Acesso negado ou modo cliente não configurado.");
        }
    }

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    // Handlers do Painel
    db.ref('veiculos').on('value', (snap) => { bancoDados = snap.val() || {}; desenharTabela(); });

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            corpo.innerHTML += `<tr>
                <td><b>${p}</b><br><small>${v.modelo}</small></td>
                <td><span style="color:${v.status === 'Pronto' ? '#10b981' : '#f59e0b'}">${v.status}</span></td>
                <td style="text-align:right"><button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer;">✏️</button></td>
            </tr>`;
        });
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco || "";
        document.getElementById('m-obs').value = v.obs || "";
        fotosBase64 = v.fotos || [];
        renderizarFotos();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderizarFotos() {
        const area = document.getElementById('preview-area');
        area.innerHTML = fotosBase64.map(f => `<img src="${f}" class="img-item" onclick="abrirImg('${f}')">`).join('');
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => { fotosBase64.push(e.target.result); renderizarFotos(); };
            reader.readAsDataURL(file);
        });
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value;
        if(!placa) return showAlert("Selecione um veículo para editar");
        const dados = {
            modelo: document.getElementById('m-modelo').value,
            preco: document.getElementById('m-preco').value,
            obs: document.getElementById('m-obs').value,
            status: statusSelecionado,
            fotos: fotosBase64
        };
        db.ref('veiculos/' + placa).update(dados).then(() => {
            showAlert("✅ Atualizado com sucesso!");
            limpar();
        });
    }

    function limpar() {
        document.getElementById('m-placa').value = "";
        document.getElementById('m-preco').value = "";
        document.getElementById('m-obs').value = "";
        document.getElementById('preview-area').innerHTML = "";
        fotosBase64 = [];
    }

    function setStatus(el) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        statusSelecionado = el.getAttribute('data-status');
    }

    function filtrarTabela(f, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        desenharTabela(f);
    }

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".",",");
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        i.value = v;
    }

    function addServico(t) { document.getElementById('m-obs').value += t + ", "; }
    function showAlert(m) { const a = document.getElementById('custom-alert'); a.innerText = m; a.style.display='block'; setTimeout(()=>a.style.display='none', 3000); }
    function abrirImg(s) { document.getElementById('modal-view').src = s; document.getElementById('img-modal').style.display='flex'; }
</script>
</body>
</html>
