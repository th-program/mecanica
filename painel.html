<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg: #000b1a; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #d4af37; 
            --primary-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: rgba(255, 255, 255, 0.1); 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 15, 35, 0.8); 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 20px; 
            line-height: 1.4;
        }

        .container { width: 100%; max-width: 1100px; margin: 0 auto; }

        /* Ajuste da Logo para não vazar */
        .logo-box { text-align: center; margin-bottom: 25px; width: 100%; overflow: hidden; } 
        .logo-img { max-width: 100%; height: auto; width: 180px; filter: drop-shadow(0 0 10px var(--primary-glow)); object-fit: contain; } 
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 24px; 
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
        } 

        /* Botões de Filtro Restaurados */
        .categorias-filtro { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; } 
        .categorias-filtro::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); 
            color: var(--text-dim); 
            padding: 10px 18px; 
            border-radius: 50px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: 0.3s;
        } 
        .cat-btn.active { border-color: var(--primary); color: #000; background: var(--primary); box-shadow: 0 0 10px var(--primary-glow); } 

        /* Inputs e Formulário */
        label { display: block; font-size: 11px; color: var(--primary); margin: 15px 0 5px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; } 
        input, textarea, select { 
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; font-size: 16px; transition: 0.3s; 
        }
        
        .btn-main { 
            background: var(--primary); color: #000; width: 100%; padding: 16px; border: none; 
            border-radius: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* Botão de Upload Customizado */
        .btn-upload-custom { 
            border: 2px dashed var(--primary); color: var(--primary); padding: 20px; border-radius: 15px; 
            text-align: center; cursor: pointer; display: block; font-weight: 700; background: rgba(212, 175, 55, 0.05); 
        }

        /* Atalhos de Relatório (+Revisão, etc) */
        .tags-atalho { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag-btn { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text-dim); 
            padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; 
        }
        .tag-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Grid do Painel Adm */
        .painel-grid { display: grid; grid-template-columns: 1fr; gap: 25px; } 
        @media (min-width: 992px) { .painel-grid { grid-template-columns: 1.3fr 0.7fr; } } 

        /* Ajustes Mobile Horizontal */
        @media (orientation: landscape) and (max-height: 500px) {
            .logo-img { width: 120px; }
            .painel-grid { grid-template-columns: 1fr 1fr; }
            .card { padding: 15px; }
        }

        .table-container { background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img" alt="Lima Car"></div>
        <div id="area-busca">
            <label>Identificação (@)</label>
            <input type="text" id="login-user" placeholder="@usuario" oninput="verificarUsuarioMecanico(this.value)">
            
            <label>Senha</label>
            <input type="password" id="login-pass" placeholder="••••">
            
            <div id="wrapper-placa" class="hidden">
                <label>Placa do Veículo</label>
                <input type="text" id="login-placa" style="text-align:center; font-weight:bold; letter-spacing:2px;" maxlength="7" placeholder="ABC1234">
            </div>
            
            <button class="btn-main" style="margin-top:20px;" onclick="gerenciarLogin()">Entrar</button>
        </div>
        <div id="resultado-cliente"></div>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--primary); font-size:18px;">PAINEL MECÂNICO</h2>
            <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">SAIR</button>
        </div>

        <div class="painel-grid">
            <div>
                <div class="categorias-filtro">
                    <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                    <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Na Fila</button>
                    <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                    <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>
                </div>
                <div class="table-container">
                    <table id="corpo-tabela"></table>
                </div>
            </div>

            <div>
                <label>Placa</label>
                <input type="text" id="m-placa" placeholder="Placa">
                
                <label>Veículo</label>
                <input type="text" id="m-modelo" placeholder="Ex: Corolla XEi">
                
                <label>Fotos (Estado do Carro)</label>
                <label for="m-fotos-input" class="btn-upload-custom">📸 CLIQUE PARA ENVIAR FOTOS</label>
                <input type="file" id="m-fotos-input" multiple accept="image/*" style="display:none;" onchange="previewImages()">
                <div id="preview-area" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px;"></div>

                <label>Relatório Técnico</label>
                <div class="tags-atalho">
                    <button class="tag-btn" onclick="addTag('+ Revisão Geral')">+ Revisão</button>
                    <button class="tag-btn" onclick="addTag('+ Troca de Óleo e Filtros')">+ Óleo</button>
                    <button class="tag-btn" onclick="addTag('+ Passagem de Scanner')">+ Scanner</button>
                </div>
                <textarea id="m-obs" rows="4" placeholder="Descreva o serviço..."></textarea>

                <label>Valor do Serviço</label>
                <input type="text" id="m-preco" placeholder="R$ 0,00" oninput="mascaraMoeda(this)">

                <button class="btn-main" style="margin-top:20px;" onclick="salvar()">✅ SALVAR NO SISTEMA</button>
            </div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    // IMPORTANTE: Insira suas chaves aqui
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456:web:abc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Configurações e Funções Auxiliares
    function addTag(texto) {
        const area = document.getElementById('m-obs');
        area.value += (area.value ? '\n' : '') + texto;
    }

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".",",");
        i.value = "R$ " + v;
    }

    // --- LÓGICA DE LOGIN E FUNCIONALIDADES (MANTIDA ORIGINAL) ---

    const LOGIN_ADM = "adm.limacar";
    const SENHA_ADM = "1234";
    
    let statusSelecionado = "Aguardando";
    let bancoDados = {}; 
    let bancoSolicitacoes = {};
    let fotosBase64 = [];
    let whatsappAtual = "";
    let nomeClienteAtual = "";
    let relatoClienteAtual = "";

    function verificarUsuarioMecanico(valor) {
        const wrapperPlaca = document.getElementById('wrapper-placa');
        const loginLimpo = valor.trim().toLowerCase().replace('@','');
        if (LOGIN_ADM.startsWith(loginLimpo) || loginLimpo === "") {
            wrapperPlaca.classList.add('hidden');
        } else {
            wrapperPlaca.classList.remove('hidden');
        }
    }

    function gerenciarLogin() {
        const user = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
        const pass = document.getElementById('login-pass').value.trim();
        if(user === LOGIN_ADM && pass === SENHA_ADM) {
            irPara('view-painel');
        } else {
            consultarCarro();
        }
    }

    function consultarCarro() {
        const user = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
        const pass = document.getElementById('login-pass').value.trim();
        const placa = document.getElementById('login-placa').value.trim().toUpperCase();
        const res = document.getElementById('resultado-cliente');

        if(!user || !pass || !placa) return alert("⚠️ PREENCHA TUDO");

        db.ref('usuarios/' + user).once('value', (snap) => {
            if(snap.exists() && snap.val().senha === pass) {
                db.ref('veiculos/' + placa).once('value', (sV) => {
                    const v = sV.val();
                    if(v && v.identificacao === user) {
                        res.innerHTML = `
                            <div style="margin-top:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border);">
                                <h3 style="color:var(--primary)">${v.modelo}</h3>
                                <p>Status: <b>${v.status}</b></p>
                                <p style="margin:15px 0; font-size:14px;">${v.obs}</p>
                                <p style="color:var(--success); font-weight:bold; font-size:18px">${v.preco}</p>
                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                                    ${(v.fotos || []).map(f => `<img src="${f}" style="width:100%; border-radius:8px;">`).join('')}
                                </div>
                            </div>
                            <button onclick="location.reload()" class="btn-main" style="margin-top:10px; background:#132a47; color:#fff">VOLTAR</button>`;
                        document.getElementById('area-busca').classList.add('hidden');
                    } else { alert("🔍 VEÍCULO NÃO ENCONTRADO"); }
                });
            } else { alert("❌ LOGIN OU SENHA INCORRETOS"); }
        });
    }

    // --- FUNÇÕES DO PAINEL ADM ---

    db.ref('veiculos').on('value', (s) => { 
        bancoDados = s.val() || {}; 
        desenharTabela(); 
    });

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).reverse().forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            corpo.innerHTML += `
                <tr>
                    <td><b>${p}</b><br><small>${v.modelo}</small></td>
                    <td>${v.status}</td>
                    <td style="text-align:right">
                        <button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer;">✏️</button>
                    </td>
                </tr>`;
        });
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const dados = {
            modelo: document.getElementById('m-modelo').value,
            status: statusSelecionado,
            preco: document.getElementById('m-preco').value,
            obs: document.getElementById('m-obs').value,
            fotos: fotosBase64,
            identificacao: document.getElementById('m-identificacao-interna')?.value || ""
        };
        
        if(!placa) return alert("❌ DIGITE A PLACA");
        
        db.ref('veiculos/' + placa).set(dados).then(() => {
            alert("✔️ SALVO COM SUCESSO");
            location.reload();
        });
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        const area = document.getElementById('preview-area');
        area.innerHTML = "";
        fotosBase64 = [];
        Array.from(files).forEach(f => {
            const r = new FileReader();
            r.onload = (e) => { 
                fotosBase64.push(e.target.result); 
                area.innerHTML += `<img src="${e.target.result}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px;">`;
            };
            r.readAsDataURL(f);
        });
    }

    function filtrarTabela(f, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        statusSelecionado = f === "Todos" ? "Aguardando" : f;
        desenharTabela(f);
    }

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }</script>
</body>
</html>
