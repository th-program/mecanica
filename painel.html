<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg: #000b1a; 
            --primary: #d4af37; 
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: #132a47; 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 30, 61, 0.7); 
            --logo-size: 220px; 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        /* Estilo Botão Localizar conforme Imagem 1 */
        .btn-localizar-img1 {
            background: #d4af37;
            color: #000;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-home-fixed {
            position: fixed; top: 20px; left: 20px;
            background: var(--input-bg); border: 1px solid var(--primary);
            color: var(--primary); padding: 10px 15px; border-radius: 50px;
            text-decoration: none; font-size: 14px; font-weight: bold;
            z-index: 1000; transition: 0.3s; display: flex; align-items: center; gap: 5px;
        }

        .container { width: 100%; max-width: 450px; } 
        #view-painel { width: 100%; max-width: 1000px; }
        
        section { display: block; animation: fadeIn 0.4s ease-out; width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { padding: 10px; position: relative; } 

        .logo-box { text-align: center; margin-bottom: 20px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); } 
        
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; } 
        
        input, textarea, select { 
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; font-size: 16px !important; margin-bottom: 15px; 
        } 
        
        .input-placa-grande { font-family: 'Monaco', monospace; font-size: 35px !important; background: #fff !important; color: #000 !important; border: 4px solid var(--primary) !important; text-transform: uppercase; letter-spacing: 5px; text-align: center; } 
        
        .btn-main { background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); color: #000; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 14px; } 

        /* Responsividade Painel Mecânico */
        .painel-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; } 
        @media (min-width: 768px) { 
            .painel-grid { grid-template-columns: 1fr 1fr; } 
            #view-painel { max-width: 95%; }
        }

        /* Ajustes Mobile Android/iOS */
        @media (max-width: 600px) {
            .painel-grid { grid-template-columns: 1fr; }
            .status-picker { grid-template-columns: 1fr !important; }
            .input-placa-grande { font-size: 28px !important; }
        }

        .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; } 
        .status-option { background: rgba(0, 30, 61, 0.5); border: 1px solid var(--border); padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; color: var(--text-dim); } 
        .status-option.active { border-color: var(--primary); color: #fff; background: rgba(212, 175, 55, 0.2); }

        .hidden { display: none !important; } 
        .fotos-grid { display: grid; gap: 10px; margin-top: 15px; grid-template-columns: repeat(2, 1fr); } 
        .img-item { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; border: 1px solid var(--border); } 

        .whatsapp-float-btn { background: #25d366 !important; color: white !important; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; border: none; text-decoration: none; border-radius: 15px; padding: 18px; font-weight: 900; font-size: 14px; }
        .btn-cadastro { background: #1a73e8; color: white; margin-top: 15px; }
    </style>
</head>
<body>

<a href="#" class="btn-home-fixed" onclick="location.reload()"><span>🏠</span> INÍCIO</a>

<div id="custom-alert" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <label>Consulte seu veículo</label>
        <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="Sua Placa" oninput="ajustarBotaoBusca()">
        
        <button id="btn-localizar" class="btn-localizar-img1" onclick="consultarCarro()">LOCALIZAR VEÍCULO</button>
        
        <div id="resultado-cliente"></div>
        
        <div id="botoes-cliente-acao">
            <button onclick="irPara('view-cadastro-cliente')" class="btn-main btn-cadastro">SOLICITAR MANUTENÇÃO (CADASTRO)</button>
        </div>

        <a href="https://wa.me/55SEUNUMERO" target="_blank" class="whatsapp-float-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" style="filter: brightness(0) invert(1);"> 
            FALAR COM A OFICINA
        </a>

        <center><button onclick="irPara('view-login')" style="background:none; border:none; color:var(--text-dim); margin-top:40px; font-size:11px; cursor:pointer;">🔒 ACESSO RESTRITO</button></center>
    </section>

    <section id="view-cadastro-cliente" class="card hidden">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:25px;">NOVO CADASTRO</h2>
        <label>Nome Completo</label><input type="text" id="c-nome">
        <label>WhatsApp</label><input type="tel" id="c-zap">
        <label>Placa do Carro</label><input type="text" id="c-placa" maxlength="7" style="text-transform: uppercase;">
        <label>Modelo do Carro</label><input type="text" id="c-modelo">
        <label>Problemas</label><textarea id="c-problema" rows="3"></textarea>
        <button class="btn-main" onclick="clienteEnviarCadastro()">ENVIAR PARA OFICINA</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:20px; font-weight:bold; cursor:pointer;">← Voltar para Consulta</button></center>
    </section>

    <section id="view-login" class="card hidden">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <label style="text-align: center;">Chave de Acesso</label>
        <input type="password" id="pass-admin" style="text-align: center; font-size: 28px!important;">
        <button class="btn-main" onclick="logar()">Entrar</button>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
            <h2 style="font-size:14px; color:var(--primary);">PÁGINA DO MECÂNICO</h2>
            <button onclick="location.reload()" style="color:var(--danger); background:none; border:1px solid var(--danger); padding: 5px 10px; border-radius: 8px; cursor:pointer;">SAIR</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col">
                <label style="color:var(--success)">📩 Solicitações</label>
                <div id="lista-solicitacoes" style="max-height: 200px; overflow-y:auto; margin-bottom:20px;"></div>
                
                <label>Veículos na Oficina</label>
                <div style="background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto;">
                    <table id="corpo-tabela" style="width: 100%; border-collapse: collapse; font-size: 12px;"></table>
                </div>
            </div>

            <div class="painel-col">
                <div id="relatorio-cliente-view" style="display:none; background:rgba(212,175,55,0.1); padding:10px; border-radius:10px; margin-bottom:15px; font-size:12px;"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><label>Placa</label><input type="text" id="m-placa" readonly></div>
                    <div><label>Valor (R$)</label><input type="text" id="m-preco" oninput="mascaraMoeda(this)"></div>
                </div>
                <label>Modelo</label><input type="text" id="m-modelo">
                <label>Status</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Mão na Massa</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                </div>
                <label>Relato Técnico</label>
                <textarea id="m-obs" rows="3"></textarea>
                <button class="btn-main" onclick="salvar()">✅ SALVAR REGISTRO</button>
            </div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
        appId: "1:..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let bancoDados = {}; let bancoSolicitacoes = {};
    let statusSelecionado = "Aguardando";

    function ajustarBotaoBusca() {
        if(document.getElementById('login-placa').value === "") {
            document.getElementById('btn-localizar').classList.remove('hidden');
            document.getElementById('resultado-cliente').innerHTML = "";
            document.getElementById('botoes-cliente-acao').classList.remove('hidden');
        }
    }

    function consultarCarro() {
        const p = document.getElementById('login-placa').value.toUpperCase().trim();
        const res = document.getElementById('resultado-cliente');
        const btnBusca = document.getElementById('btn-localizar');
        const areaCadastro = document.getElementById('botoes-cliente-acao');

        if(bancoDados[p]) {
            btnBusca.classList.add('hidden'); 
            areaCadastro.classList.add('hidden'); // Remove botão de cadastro conforme Imagem 3
            const v = bancoDados[p];
            res.innerHTML = `
                <div style="margin-top:20px; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; border:1px solid var(--primary);">
                    <h3 style="color:var(--primary)">${v.modelo}</h3>
                    <p>Status: <b style="color:var(--warning)">${v.status}</b></p>
                    <p style="font-size:13px; margin:10px 0;">${v.obs}</p>
                    <p style="color:var(--success); font-weight:bold; font-size:20px">Total: R$ ${v.preco}</p>
                    <button onclick="location.reload()" class="btn-main" style="margin-top:15px; background:#333; color:#fff;">VOLTAR PARA CONSULTA</button>
                </div>`;
        } else { showAlert("🔍 VEÍCULO NÃO ENCONTRADO"); }
    }

    function clienteEnviarCadastro() {
        const placa = document.getElementById('c-placa').value.toUpperCase().trim();
        if(bancoDados[placa] || bancoSolicitacoes[placa]) {
            return showAlert("⚠️ ESTA PLACA JÁ POSSUI UM CADASTRO ATIVO!");
        }
        
        const dados = {
            nome: document.getElementById('c-nome').value,
            zap: document.getElementById('c-zap').value,
            placa: placa,
            modelo: document.getElementById('c-modelo').value,
            problema: document.getElementById('c-problema').value
        };

        if(!dados.nome || !dados.placa) return showAlert("❌ PREENCHA OS CAMPOS");

        db.ref('pre_cadastros/' + placa).set(dados).then(() => {
            showAlert("✔️ ENVIADO!");
            irPara('view-cliente');
        });
    }

    // --- FUNÇÕES DE SISTEMA ---
    db.ref('veiculos').on('value', s => { bancoDados = s.val() || {}; desenharTabela(); });
    db.ref('pre_cadastros').on('value', s => { bancoSolicitacoes = s.val() || {}; desenharSolicitacoes(); });

    function desenharTabela() {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).forEach(p => {
            const v = bancoDados[p];
            corpo.innerHTML += `<tr style="border-bottom:1px solid #132a47"><td style="padding:10px"><b>${p}</b><br>${v.modelo}</td><td>${v.status}</td><td onclick="prepararEdicao('${p}')">✏️</td></tr>`;
        });
    }

    function desenharSolicitacoes() {
        const c = document.getElementById('lista-solicitacoes');
        c.innerHTML = "";
        Object.keys(bancoSolicitacoes).forEach(id => {
            const s = bancoSolicitacoes[id];
            c.innerHTML += `<div style="background:#132a47; padding:8px; border-radius:8px; margin-bottom:5px; font-size:11px;">
                <b>${s.placa}</b> - ${s.modelo} <button onclick="importar('${id}')" style="float:right">EDITAR</button>
            </div>`;
        });
    }

    function importar(id) {
        const s = bancoSolicitacoes[id];
        document.getElementById('m-placa').value = s.placa;
        document.getElementById('m-modelo').value = s.modelo;
        document.getElementById('relatorio-cliente-view').style.display = "block";
        document.getElementById('relatorio-cliente-view').innerHTML = `<b>Cliente:</b> ${s.nome}<br><b>Relato:</b> ${s.problema}`;
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value;
        const dados = {
            modelo: document.getElementById('m-modelo').value,
            preco: document.getElementById('m-preco').value,
            status: statusSelecionado,
            obs: document.getElementById('m-obs').value
        };
        db.ref('veiculos/' + placa).set(dados).then(() => {
            db.ref('pre_cadastros/' + placa).remove();
            showAlert("✅ SALVO!");
        });
    }

    function irPara(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function logar() { if(document.getElementById('pass-admin').value === "1234") irPara('view-painel'); }
    function setStatus(el) { document.querySelectorAll('.status-option').forEach(o => o.classList.remove('active')); el.classList.add('active'); statusSelecionado = el.dataset.status; }
    function mascaraMoeda(i) { let v = i.value.replace(/\D/g,''); v = (v/100).toFixed(2).replace(".",","); i.value = v; }
    function showAlert(m) { const d = document.getElementById('custom-alert'); d.innerText = m; d.style.display='block'; setTimeout(()=>d.style.display='none', 2000); }
</script>
</body>
</html>
