<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg: #000b1a; 
            --primary: #d4af37; 
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: #132a47; 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 30, 61, 0.7); 
            --logo-size: 220px; 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            padding: 20px 15px; 
            overflow-x: hidden; 
        }

        .btn-home-fixed {
            position: fixed; top: 20px; left: 20px;
            background: var(--input-bg); border: 1px solid var(--primary);
            color: var(--primary); padding: 10px 15px; border-radius: 50px;
            text-decoration: none; font-size: 14px; font-weight: bold;
            z-index: 1000; transition: 0.3s; display: flex; align-items: center; gap: 5px;
        }

        .container { width: 100%; max-width: 450px; margin-top: 60px; } 
        @media (min-width: 768px) { .container { max-width: 900px; } }

        section { display: block; animation: fadeIn 0.4s ease-out; width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { background: none; padding: 10px; position: relative; } 

        .logo-box { text-align: center; margin-bottom: 30px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); } 
        
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; } 
        
        input, textarea, select { 
            width: 100%; padding: 14px; background: var(--input-bg); 
            border: 1px solid var(--border); border-radius: 12px; color: #fff; 
            font-size: 15px; margin-bottom: 18px; 
        } 
        
        .input-placa-grande { 
            font-family: 'Monaco', monospace; font-size: 32px !important; 
            background: #fff !important; color: #000 !important; 
            border: 4px solid var(--primary) !important; text-transform: uppercase; 
            letter-spacing: 5px; text-align: center; border-radius: 15px !important; 
        }

        .btn-main { 
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); 
            color: #000; width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; 
            text-decoration: none; text-align: center; display: block; margin-top: 10px;
        } 

        .categorias-filtro { display: flex; gap: 8px; margin-top: 25px; overflow-x: auto; padding-bottom: 10px; } 
        .cat-btn { 
            background: var(--input-bg); border: 1px solid var(--border); 
            color: var(--text-dim); padding: 10px 18px; border-radius: 12px; 
            font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap; 
        } 
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.15); } 

        .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; } 
        .status-option { 
            background: rgba(0, 30, 61, 0.5); border: 1px solid var(--border); 
            padding: 12px 5px; border-radius: 12px; text-align: center; 
            font-size: 10px; font-weight: 800; cursor: pointer; color: var(--text-dim); 
        } 
        .status-option.active { border-color: var(--primary); color: #fff; background: rgba(212, 175, 55, 0.1); }

        .table-container { margin-top: 20px; background: rgba(255,255,255,0.02); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; } 
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 13px; } 
        
        .hidden { display: none !important; } 
        .fotos-grid { display: grid; gap: 10px; margin-top: 15px; grid-template-columns: repeat(2, 1fr); } 
        .img-item { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; border: 1px solid var(--border); } 

        .tag-servico { 
            font-size: 10px; background: #132a47; padding: 6px 12px; 
            border-radius: 20px; cursor: pointer; border: 1px solid var(--border); 
            color: var(--text-dim); font-weight: bold;
        }

        .painel-grid { display: grid; grid-template-columns: 1fr; gap: 30px; } 
        @media (min-width: 768px) { .painel-grid { grid-template-columns: 1.2fr 0.8fr; } } 
    </style>
</head>
<body>

<a href="#" class="btn-home-fixed" onclick="location.reload()"><span>🏠</span> INÍCIO</a>

<div id="custom-alert" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none;"></div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        
        <div id="area-busca">
            <label>Consulte seu veículo</label>
            <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="Sua Placa">
            <button class="btn-main" onclick="consultarCarro()">Localizar Veículo</button>
        </div>

        <div id="resultado-cliente"></div>
        
        <div id="botoes-acao-cliente">
            <button id="btn-solicitar-cadastro" onclick="irPara('view-cadastro-cliente')" class="btn-main" style="background: #25d366; color: white;">SOLICITAR MANUTENÇÃO (CADASTRO)</button>
            <a id="btn-falar-oficina" href="https://wa.me/5500000000000" target="_blank" class="btn-main hidden" style="background: #25d366; color: white;">FALAR COM A OFICINA</a>
            <button id="btn-voltar-busca" onclick="location.reload()" class="btn-main hidden" style="background: #132a47; color: white;">VOLTAR PARA CONSULTA</button>
        </div>

        <center><button onclick="irPara('view-login')" style="background:none; border:none; color:var(--text-dim); margin-top:40px; font-size:11px; cursor:pointer;">🔒 ACESSO RESTRITO</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:16px; color:var(--primary);">PÁGINA DO MECÂNICO</h2>
            <button onclick="location.reload()" style="color:var(--danger); background:rgba(231, 76, 60, 0.1); border:1px solid var(--danger); padding: 8px 15px; border-radius: 10px; font-weight:bold; font-size:11px; cursor:pointer;">SAIR (ESC)</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col">
                <label style="color:var(--success)">📩 NOVAS SOLICITAÇÕES</label>
                <div id="lista-solicitacoes" style="margin-bottom: 20px;"></div>
                
                <div class="categorias-filtro">
                    <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                    <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Na Fila</button>
                    <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                    <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>
                </div>

                <div class="table-container">
                    <table id="corpo-tabela" style="width: 100%; border-collapse: collapse;"></table>
                </div>
            </div>

            <div class="painel-col">
                <div id="relatorio-cliente-view" style="display:none; background:rgba(212,175,55,0.1); padding:15px; border-radius:12px; margin-bottom:15px;">
                    <label>RELATO DO CLIENTE:</label>
                    <span id="txt-relato-cliente" style="font-size:13px"></span>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><label>Placa</label><input type="text" id="m-placa" readonly style="opacity:0.6"></div>
                    <div><label>Valor (R$)</label><input type="text" id="m-preco" oninput="mascaraMoeda(this)"></div>
                </div>
                
                <label>Modelo do Veículo</label>
                <input type="text" id="m-modelo" readonly style="opacity:0.6">
                
                <label>Fotos (Estado do Carro)</label>
                <label for="m-fotos-input" class="btn-main" style="background:#132a47; color:var(--primary); font-size:12px; padding:12px; border:1px dashed var(--primary)">📸 ENVIAR FOTOS</label>
                <input type="file" id="m-fotos-input" multiple onchange="previewImages()" style="display:none">
                <div id="preview-area" class="fotos-grid"></div>

                <label style="margin-top:20px">Status da Manutenção</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Mão na Massa</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                </div>

                <label>Relatório Técnico</label>
                <div style="display:flex; gap:5px; margin-bottom:10px">
                    <span class="tag-servico" onclick="addServico('Revisão')">+ Revisão</span>
                    <span class="tag-servico" onclick="addServico('Óleo')">+ Óleo</span>
                    <span class="tag-servico" onclick="addServico('Scanner')">+ Scanner</span>
                </div>
                <textarea id="m-obs" rows="4" placeholder="Descreva o serviço..."></textarea>
                
                <button class="btn-main" onclick="salvar()">✅ Salvar Registro</button>
            </div>
        </div>
    </section>

    <section id="view-cadastro-cliente" class="card hidden">
        <h2 style="text-align:center; color:var(--primary); margin-bottom:20px">NOVO CADASTRO</h2>
        <label>Nome</label><input type="text" id="c-nome">
        <label>WhatsApp</label><input type="tel" id="c-zap">
        <label>Placa</label><input type="text" id="c-placa" maxlength="7">
        <label>Modelo</label><input type="text" id="c-modelo">
        <label>Problema</label><textarea id="c-problema"></textarea>
        <button class="btn-main" onclick="clienteEnviarCadastro()">ENVIAR PARA OFICINA</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer">Voltar</button></center>
    </section>

    <section id="view-login" class="card hidden">
        <label>Chave de Acesso</label>
        <input type="password" id="pass-admin" style="text-align:center; font-size:24px">
        <button class="btn-main" onclick="logar()">Entrar</button>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // Configurações do Firebase
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
        messagingSenderId: "COLE_AQUI",
        appId: "COLE_AQUI"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let bancoDados = {}; let statusSelecionado = "Aguardando"; let fotosBase64 = [];

    // FUNÇÃO PRINCIPAL: CONSULTA CLIENTE (Lógica da Imagem 1 e 3)
    function consultarCarro() {
        const p = document.getElementById('login-placa').value.toUpperCase().trim();
        const res = document.getElementById('resultado-cliente');
        const areaBusca = document.getElementById('area-busca');
        const btnSolicitar = document.getElementById('btn-solicitar-cadastro');
        const btnFalarOficina = document.getElementById('btn-falar-oficina');
        const btnVoltarBusca = document.getElementById('btn-voltar-busca');

        if(bancoDados[p]) {
            const v = bancoDados[p];
            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");
            
            res.innerHTML = `
                <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border); margin-top:20px">
                    <h3 style="color:var(--primary)">${v.modelo}</h3>
                    <p>Status: <b style="color:${cor}">${v.status}</b></p>
                    <p style="margin:15px 0; font-size:14px">${v.obs}</p>
                    <p style="color:var(--success); font-weight:bold; font-size:20px">Total: R$ ${v.preco}</p>
                    <div class="fotos-grid">${(v.fotos || []).map(img => `<img src="${img}" class="img-item">`).join('')}</div>
                </div>`;
            
            areaBusca.classList.add('hidden');
            btnSolicitar.classList.add('hidden');
            btnFalarOficina.classList.remove('hidden');
            btnVoltarBusca.classList.remove('hidden');
        } else {
            alert("Veículo não encontrado.");
        }
    }

    // CRUD E SINCRONIZAÇÃO
    db.ref('veiculos').on('value', s => { bancoDados = s.val() || {}; desenharTabela(); });

    function salvar() {
        const p = document.getElementById('m-placa').value;
        const dados = {
            modelo: document.getElementById('m-modelo').value,
            preco: document.getElementById('m-preco').value,
            obs: document.getElementById('m-obs').value,
            status: statusSelecionado,
            fotos: fotosBase64
        };
        db.ref('veiculos/' + p).update(dados).then(() => {
            alert("Salvo!");
            location.reload();
        });
    }

    // UTILITÁRIOS
    function mascaraMoeda(i) { 
        let v = i.value.replace(/\D/g,''); 
        v = (v/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        i.value = v; 
    }
    function irPara(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function logar() { if(document.getElementById('pass-admin').value === "1234") irPara('view-painel'); }
    function setStatus(el) { 
        document.querySelectorAll('.status-option').forEach(o => o.classList.remove('active')); 
        el.classList.add('active'); statusSelecionado = el.dataset.status; 
    }
    function addServico(t) { document.getElementById('m-obs').value += (document.getElementById('m-obs').value ? " | " : "") + t; }
    
    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        Array.from(files).forEach(f => {
            const r = new FileReader();
            r.onload = e => { fotosBase64.push(e.target.result); renderPreview(); };
            r.readAsDataURL(f);
        });
    }
    function renderPreview() {
        document.getElementById('preview-area').innerHTML = fotosBase64.map(img => `<img src="${img}" class="img-item">`).join('');
    }

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            corpo.innerHTML += `<tr>
                <td><b>${p}</b><br>${v.modelo}</td>
                <td>${v.status}</td>
                <td><button onclick="prepararEdicao('${p}')">✏️</button></td>
            </tr>`;
        });
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco || "0,00";
        document.getElementById('m-obs').value = v.obs || "";
        fotosBase64 = v.fotos || [];
        renderPreview();
    }
</script>
</body>
</html>
