<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg-deep: #050a10; 
            --primary-gold: #d4af37; 
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f1d57a 50%, #b8962d 100%);
            --input-bg: rgba(255, 255, 255, 0.05); 
            --border-gold: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-dim: #a0aec0;
            --danger: #ff4d4d;
            --success: #00ff88;
        } 

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; } 

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: linear-gradient(to right, rgba(5, 10, 16, 0.93), rgba(5, 10, 16, 0.98)), url('car.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .btn-home-fixed {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--primary-gold);
            color: var(--primary-gold); padding: 8px 15px; border-radius: 8px;
            text-decoration: none; font-size: 10px; font-weight: bold;
            text-transform: uppercase; transition: 0.3s; backdrop-filter: blur(10px);
        }

        .main-wrapper {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 70px 15px 30px 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .login-layout {
            display: grid;
            grid-template-columns: 1fr 450px 1fr;
            gap: 30px;
            align-items: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .card-glass {
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-gold);
            padding: 35px 25px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
        }

        /* --- AJUSTES PAINEL TÉCNICO (MECÂNICO) --- */
        .painel-grid { 
            display: grid; 
            grid-template-columns: 420px 1fr; /* Igual à imagem: lista esquerda, editor direita */
            gap: 25px; 
            align-items: start;
        }

        .painel-col { display: flex; flex-direction: column; gap: 15px; }

        .solicitacao-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-gold); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
        }

        .btn-edit-inline {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Estilo Form */
        .form-editor-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-gold);
            padding: 20px;
            border-radius: 15px;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        label { display: block; font-size: 10px; color: var(--primary-gold); margin-bottom: 6px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
        
        input, textarea { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(212,175,55,0.2); border-radius: 8px;
            color: #fff; font-size: 14px;
        }

        .upload-dashed {
            border: 1px dashed var(--primary-gold);
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            color: var(--primary-gold);
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .status-picker { display: flex; gap: 10px; margin-bottom: 15px; }
        .status-option { 
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-dim);
        }
        .status-option.active { border-color: var(--primary-gold); color: var(--primary-gold); background: rgba(212,175,55,0.1); }

        .btn-save-final {
            background: var(--gold-gradient);
            color: #000;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        /* --- MOBILE --- */
        @media (max-width: 1024px) {
            .login-layout { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
            .painel-grid { grid-template-columns: 1fr; }
            .painel-col:nth-child(2) { order: 1; } /* Editor no Topo */
            .painel-col:nth-child(1) { order: 2; } /* Listas abaixo */
        }

        .hidden { display: none !important; }
        .cat-btn { background: var(--input-bg); border: 1px solid var(--border-gold); color: var(--text-dim); padding: 8px 12px; border-radius: 8px; font-size: 9px; font-weight: bold; cursor: pointer; }
        .cat-btn.active { background: var(--primary-gold); color: #000; }
        .table-container { background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid var(--border-gold); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid rgba(212,175,55,0.1); font-size: 13px; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home-fixed" onclick="location.reload()">INÍCIO</a>

    <div id="custom-alert" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; padding: 12px 20px; border-radius: 10px; background: var(--danger); color: white; display: none; font-size: 12px; font-weight: bold;"></div>
    
    <div id="img-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center;" onclick="this.style.display='none'">
        <img id="modal-view" src="" style="max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--primary-gold);">
    </div>

    <div class="main-wrapper">
        
        <section id="view-cliente" class="login-layout">
            <div></div>
            <div class="card-glass">
                <div class="logo-box" style="text-align: center; margin-bottom: 25px;">
                    <img src="logo.jpg" style="width: 160px;" alt="Logo">
                    <p style="font-size: 8px; letter-spacing: 4px; color: var(--primary-gold); margin-top: 12px; font-weight: bold;">PREMIUM AUTO SERVICE</p>
                </div>

                <div id="area-busca">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label>Identificação</label>
                        <input type="text" id="login-user" placeholder="@usuario" oninput="verificarUsuarioMecanico(this.value)">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label>Senha</label>
                        <input type="password" id="login-pass" placeholder="••••">
                    </div>
                    <div id="wrapper-placa" class="hidden" style="margin-bottom: 15px;">
                        <label>Placa do Veículo</label>
                        <input type="text" id="login-placa" style="font-family: monospace; font-size: 20px; text-align: center; font-weight: bold; background: #fff; color: #000;" maxlength="7" placeholder="ABC1D23">
                    </div>
                    <button class="btn-main" onclick="gerenciarLogin()" style="background: var(--gold-gradient); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">ACESSAR SISTEMA</button>
                </div>
                <div id="resultado-cliente"></div>
            </div>
            <div></div>
        </section>

        <section id="view-painel" class="card-glass hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 15px;">
                <h2 style="font-size:14px; color:var(--primary-gold); letter-spacing: 2px;">PAINEL TÉCNICO</h2>
                <button onclick="location.reload()" style="color:var(--danger); background:none; border:1px solid var(--danger); padding: 5px 12px; border-radius: 6px; font-size: 9px; font-weight: bold; cursor:pointer;">SAIR</button>
            </div>

            <div class="painel-grid">
                
                <div class="painel-col">
                    <h3 style="color:var(--success); font-size: 11px; letter-spacing: 1px; margin-bottom: 10px;">📩 NOVAS SOLICITAÇÕES</h3>
                    <div id="lista-solicitacoes"></div>

                    <div style="margin-top: 20px;">
                        <div class="categorias-filtro" style="display:flex; gap:5px; margin-bottom:10px;">
                            <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">Todos</button>
                            <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">Fila</button>
                            <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">Oficina</button>
                            <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">Prontos</button>
                        </div>
                        <div class="table-container">
                            <table id="corpo-tabela"></table>
                        </div>
                    </div>
                </div>

                <div class="painel-col">
                    <div class="form-editor-box">
                        <div class="form-row">
                            <div>
                                <label>PLACA</label>
                                <input type="text" id="m-placa" readonly style="opacity: 0.7; font-weight: bold; color: var(--primary-gold);">
                            </div>
                            <div>
                                <label>VALOR (R$)</label>
                                <input type="text" id="m-preco" placeholder="0,00" oninput="mascaraMoeda(this)">
                            </div>
                        </div>

                        <div style="margin-bottom: 15px;">
                            <label>MODELO E ANO DO VEÍCULO</label>
                            <input type="text" id="m-modelo" readonly style="opacity: 0.7;">
                        </div>

                        <label>FOTOS (ESTADO DO CARRO)</label>
                        <div class="upload-dashed" onclick="document.getElementById('m-fotos-input').click()">
                            📷 CLIQUE PARA ENVIAR FOTOS
                        </div>
                        <input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()" style="display: none;">
                        <div id="preview-area" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-bottom: 15px;"></div>

                        <label>STATUS DA MANUTENÇÃO</label>
                        <div class="status-picker">
                            <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                            <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Mão na Massa</div>
                            <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                        </div>

                        <label>RELATÓRIO TÉCNICO</label>
                        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                            <button class="cat-btn" style="font-size: 8px;" onclick="document.getElementById('m-obs').value += '+ Revisão '">+ Revisão</button>
                            <button class="cat-btn" style="font-size: 8px;" onclick="document.getElementById('m-obs').value += '+ Óleo '">+ Óleo</button>
                            <button class="cat-btn" style="font-size: 8px;" onclick="document.getElementById('m-obs').value += '+ Scanner '">+ Scanner</button>
                        </div>
                        <textarea id="m-obs" rows="4" placeholder="Descreva o que foi feito no carro..."></textarea>

                        <input type="hidden" id="m-identificacao-interna">
                        
                        <button class="btn-save-final" onclick="salvar()">✅ SALVAR REGISTRO</button>
                        <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#222; color:#fff; margin-top:10px; font-size: 10px; padding: 10px;">LIMPAR EDITOR</button>
                    </div>
                </div>

            </div>
        </section>

        <p class="footer-secure">SISTEMA LIMA CAR • SEGURANÇA CRIPTOGRAFADA • 2026</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        // ... (Insira suas configurações do Firebase aqui conforme seu código original)
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "a-fonte-43744.firebaseapp.com",
            databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
            projectId: "a-fonte-43744",
            storageBucket: "a-fonte-43744.appspot.com",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const LOGIN_ADM = "adm.limacar";
        const SENHA_ADM = "1234";
        
        let statusSelecionado = "Aguardando";
        let bancoDados = {}; 
        let bancoSolicitacoes = {};
        let fotosBase64 = [];
        let whatsappAtual = "";
        let nomeClienteAtual = "";

        // Funções de controle (Mesma lógica do seu código anterior)
        function verificarUsuarioMecanico(valor) {
            const wrapperPlaca = document.getElementById('wrapper-placa');
            const loginLimpo = valor.trim().toLowerCase().replace('@','');
            if (LOGIN_ADM.startsWith(loginLimpo) || loginLimpo === "") {
                wrapperPlaca.classList.add('hidden');
            } else {
                wrapperPlaca.classList.remove('hidden');
            }
        }

        function gerenciarLogin() {
            const userDigitado = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
            const senhaDigitada = document.getElementById('login-pass').value.trim();
            if(userDigitado === LOGIN_ADM) {
                if(senhaDigitada === SENHA_ADM) { irPara('view-painel'); } 
                else { showAlert("❌ SENHA INCORRETA"); }
                return;
            }
            consultarCarro();
        }

        db.ref('veiculos').on('value', (snapshot) => {
            bancoDados = snapshot.val() || {};
            desenharTabela();
        });

        db.ref('servicos_ativos').on('value', (snapshot) => {
            bancoSolicitacoes = snapshot.val() || {};
            desenharSolicitacoes();
        });

        function desenharSolicitacoes() {
            const container = document.getElementById('lista-solicitacoes');
            container.innerHTML = "";
            Object.keys(bancoSolicitacoes).forEach(id => {
                const s = bancoSolicitacoes[id];
                container.innerHTML += `
                    <div class="solicitacao-item">
                        <b style="color:var(--primary-gold); font-size:13px">${s.placa}</b><br>
                        <span style="font-size:11px; color: #ccc;">${s.modelo} - ${s.nome_cliente}</span><br>
                        <button class="btn-edit-inline" onclick="importarSolicitacao('${id}')">EDITAR VEÍCULO</button>
                    </div>`;
            });
        }

        function importarSolicitacao(id) {
            const s = bancoSolicitacoes[id];
            document.getElementById('m-placa').value = s.placa;
            document.getElementById('m-modelo').value = s.modelo;
            document.getElementById('m-identificacao-interna').value = s.cliente_id || "";
            whatsappAtual = s.zap_cliente || "";
            nomeClienteAtual = s.nome_cliente || "";
            showAlert("DADOS CARREGADOS");
        }

        function salvar() {
            const placa = document.getElementById('m-placa').value.toUpperCase().trim();
            if(!placa) return showAlert("SELECIONE UM VEÍCULO");
            
            const dados = {
                modelo: document.getElementById('m-modelo').value,
                preco: document.getElementById('m-preco').value,
                obs: document.getElementById('m-obs').value,
                status: statusSelecionado,
                fotos: fotosBase64,
                clienteZap: whatsappAtual,
                clienteNome: nomeClienteAtual,
                identificacao: document.getElementById('m-identificacao-interna').value
            };

            db.ref('veiculos/' + placa).set(dados).then(() => {
                db.ref('servicos_ativos/' + placa).remove();
                showAlert("✅ SALVO COM SUCESSO");
                limparFormulario();
            });
        }

        function desenharTabela(filtro = "Todos") {
            const corpo = document.getElementById('corpo-tabela');
            corpo.innerHTML = "";
            Object.keys(bancoDados).forEach(p => {
                const v = bancoDados[p];
                if(filtro !== "Todos" && v.status !== filtro) return;
                corpo.innerHTML += `
                    <tr>
                        <td><b style="color:var(--primary-gold)">${p}</b><br><small>${v.status}</small></td>
                        <td style="text-align:right">
                            <button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer; font-size:16px;">✏️</button>
                        </td>
                    </tr>`;
            });
        }

        function prepararEdicao(p) {
            const v = bancoDados[p];
            document.getElementById('m-placa').value = p;
            document.getElementById('m-modelo').value = v.modelo;
            document.getElementById('m-preco').value = v.preco;
            document.getElementById('m-obs').value = v.obs;
            fotosBase64 = v.fotos || [];
            renderizarFotosEdicao();
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'}); // Sobe para o editor no mobile
        }

        function previewImages() {
            const files = document.getElementById('m-fotos-input').files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => { fotosBase64.push(e.target.result); renderizarFotosEdicao(); };
                reader.readAsDataURL(file);
            });
        }

        function renderizarFotosEdicao() {
            const area = document.getElementById('preview-area');
            area.innerHTML = "";
            fotosBase64.forEach((src, idx) => {
                area.innerHTML += `<img src="${src}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:5px; border:1px solid gold;" onclick="fotosBase64.splice(${idx},1); renderizarFotosEdicao();">`;
            });
        }

        function limparFormulario() {
            ['m-placa','m-modelo','m-preco','m-obs','m-identificacao-interna'].forEach(id => document.getElementById(id).value = "");
            fotosBase64 = [];
            renderizarFotosEdicao();
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        function mascaraMoeda(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            i.value = v;
        }

        function setStatus(el) {
            document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            statusSelecionado = el.getAttribute('data-status');
        }

        function filtrarTabela(f, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            desenharTabela(f);
        }

        function irPara(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showAlert(msg) {
            const div = document.getElementById('custom-alert');
            div.innerText = msg; div.style.display = 'block';
            setTimeout(() => { div.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>
