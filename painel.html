<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg: #000b1a; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #d4af37; 
            --primary-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: rgba(255, 255, 255, 0.1); 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 15, 35, 0.8); 
            --logo-size: 180px; 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.07) 0%, transparent 40%); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 20px; 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* --- BOTÃO HOME --- */
        .btn-home-fixed {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-home-fixed:hover { background: var(--primary); color: #000; transform: translateY(-2px); }

        @media (min-width: 768px) {
            .btn-home-fixed { position: fixed; top: 20px; left: 20px; margin-bottom: 0; z-index: 1000; }
        }

        .container { width: 100%; max-width: 480px; margin: 0 auto; } 
        #view-painel { max-width: 1100px !important; width: 100%; margin: 0 auto; }

        @media (min-width: 768px) { .container { max-width: 900px; } }

        section { animation: fadeIn 0.5s ease-out; width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 30px; 
            border-radius: 24px; 
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        } 

        .logo-box { text-align: center; margin-bottom: 35px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); filter: drop-shadow(0 0 15px var(--primary-glow)); } 
        
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; } 
        
        input, textarea, select { 
            width: 100%; 
            padding: 15px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px; 
            margin-bottom: 20px; 
            transition: all 0.3s; 
        } 
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px var(--primary-glow); background: rgba(0, 25, 50, 1); } 
        
        .input-placa-grande { 
            font-family: 'Monaco', monospace; 
            font-size: 32px !important; 
            background: #fff !important; 
            color: #000 !important; 
            border: none !important; 
            font-weight: 900;
            letter-spacing: 4px; 
            text-align: center; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        } 

        .btn-main { 
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); 
            color: #000; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 14px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.3s; 
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
            display: block; 
            text-decoration: none; 
            text-align: center; 
        } 
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(212, 175, 55, 0.4); opacity: 0.9; }

        .painel-grid { display: grid; grid-template-columns: 1fr; gap: 30px; } 
        @media (min-width: 992px) { .painel-grid { grid-template-columns: 1.3fr 0.7fr; } } 

        .categorias-filtro { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px 0; scrollbar-width: none; } 
        .categorias-filtro::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 20px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; } 
        .cat-btn.active { border-color: var(--primary); color: #000; background: var(--primary); } 

        .table-container { 
            background: rgba(0,0,0,0.2); 
            border-radius: 18px; 
            border: 1px solid var(--border); 
            overflow: hidden;
        } 
        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border); font-size: 14px; } 
        tr:hover { background: rgba(255,255,255,0.02); }

        .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; } 
        .status-option { background: var(--input-bg); border: 1px solid var(--border); padding: 14px 5px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text-dim); transition: 0.3s; } 
        .status-option.active { background: var(--primary-glow); border-color: var(--primary); color: #fff; }

        .btn-upload-custom { border: 2px dashed var(--primary); color: var(--primary); padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; display: block; margin-bottom: 20px; font-weight: 700; font-size: 13px; background: rgba(212, 175, 55, 0.05); transition: 0.3s; }

        .fotos-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); margin-top: 15px; } 
        .img-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; } 

        #img-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 99999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(15px); } 
        #modal-view { max-width: 95%; max-height: 85%; border-radius: 12px; } 

        .solicitacao-item { background: linear-gradient(145deg, rgba(212, 175, 55, 0.1), transparent); border: 1px solid rgba(212, 175, 55, 0.2); padding: 20px; border-radius: 18px; margin-bottom: 15px; }
        .tag-servico { font-size: 11px; background: var(--input-bg); padding: 8px 14px; border-radius: 50px; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); transition: 0.2s; }
        
        .whatsapp-float-btn { background: #25d366 !important; color: #fff !important; margin-bottom: 20px; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .hidden { display: none !important; } 
        #custom-alert { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 99999; padding: 16px 30px; border-radius: 50px; background: var(--danger); color: white; font-weight: 700; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed" onclick="location.reload()">🏠 INÍCIO</a>
<div id="custom-alert"></div>

<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-view" src="">
    <div style="position: absolute; top: 30px; right: 30px; color: #fff; font-size: 24px; cursor: pointer;">✕</div>
</div>

<div id="confirm-box" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10001; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
    <div class="card" style="max-width: 350px; text-align: center; border-top: 4px solid var(--danger);">
        <h3 id="confirm-title" style="color:var(--danger); margin-bottom: 15px;">CONFIRMAR?</h3>
        <button class="btn-main" id="btn-confirm-sim" style="background: var(--danger); color: #fff; margin-bottom: 12px;">SIM, EXCLUIR</button>
        <button class="btn-main" onclick="fecharConfirm()" style="background: #333; color: #fff;">CANCELAR</button>
    </div>
</div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img" alt="Lima Car"></div>
        <div id="area-busca">
            <label>Identificação (@)</label>
            <input type="text" id="login-user" placeholder="@seuusuario" oninput="verificarUsuarioMecanico(this.value)">
            <label>Senha de Acesso</label>
            <input type="password" id="login-pass" placeholder="••••">
            <div id="wrapper-placa" class="hidden">
                <label>Placa do Veículo</label>
                <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1234">
            </div>
            <button class="btn-main" id="btn-localizar" onclick="gerenciarLogin()">Entrar no Sistema</button>
        </div>
        <div id="resultado-cliente"></div>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
            <h2 style="font-size:18px; color:var(--primary); letter-spacing: 1px;">PAINEL TÉCNICO</h2>
            <button onclick="location.reload()" style="color:var(--danger); background:rgba(255, 77, 77, 0.1); border:1px solid var(--danger); padding: 10px 20px; border-radius: 12px; font-weight:bold; cursor:pointer;">SAIR</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col">
                <div id="aba-novos-cadastros">
                    <label style="color:var(--success); display: flex; align-items: center; gap: 8px;">
                        <span style="display:inline-block; width:8px; height:8px; background:var(--success); border-radius:50%; animation: pulse 1.5s infinite;"></span>
                        Novas Solicitações
                    </label>
                    <div id="lista-solicitacoes"></div>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
                    <div class="categorias-filtro">
                        <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                        <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Na Fila</button>
                        <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                        <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>
                    </div>
                    <button onclick="confirmarLimparTudo()" style="background:none; border:none; cursor:pointer; font-size:22px;">🗑️</button>
                </div>

                <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                    <table id="corpo-tabela"></table>
                </div>
            </div>

            <div class="painel-col">
                <button id="btn-whats-direto" class="btn-main whatsapp-float-btn" style="display:none;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" style="filter: brightness(0) invert(1);"> CONTATO CLIENTE
                </button>

                <div id="relatorio-cliente-view" class="solicitacao-item" style="display:none;">
                    <b style="color:var(--primary)">RELATO:</b><br>
                    <span id="txt-relato-cliente" style="font-size: 13px;"></span>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                    <div><label>Placa</label><input type="text" id="m-placa" maxlength="7" readonly style="opacity: 0.5;"></div>
                    <div><label>Valor (R$)</label><input type="text" id="m-preco" placeholder="0,00" oninput="mascaraMoeda(this)"></div>
                </div>
                
                <label>Veículo</label>
                <input type="text" id="m-modelo" readonly style="opacity: 0.5;">
                <input type="hidden" id="m-identificacao-interna">

                <label for="m-fotos-input" class="btn-upload-custom" id="label-upload">📸 SELECIONAR FOTOS</label>
                <input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()" style="display: none;">
                <div id="preview-area" class="fotos-grid"></div>

                <label style="margin-top:20px">Status</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Oficina</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                </div>

                <textarea id="m-obs" rows="4" placeholder="Relatório técnico..."></textarea>
                <button class="btn-main" onclick="salvar()">✅ SALVAR REGISTRO</button>
                <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#222; margin-top:10px">DESCARTAR</button>
            </div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI", // Cole sua API Key aqui
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
        messagingSenderId: "COLE_AQUI", // Cole seu SenderId aqui
        appId: "COLE_AQUI" // Cole seu AppId aqui
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const LOGIN_ADM = "adm.limacar";
    const SENHA_ADM = "1234";
    
    let statusSelecionado = "Aguardando";
    let bancoDados = {}; 
    let bancoSolicitacoes = {};
    let fotosBase64 = [];
    let whatsappAtual = "";
    let nomeClienteAtual = "";
    let relatoClienteAtual = "";

    function verificarUsuarioMecanico(valor) {
        const wrapperPlaca = document.getElementById('wrapper-placa');
        const loginLimpo = valor.trim().toLowerCase().replace('@','');
        if (LOGIN_ADM.startsWith(loginLimpo) || loginLimpo === "") {
            wrapperPlaca.classList.add('hidden');
        } else {
            wrapperPlaca.classList.remove('hidden');
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !document.getElementById('view-cliente').classList.contains('hidden')) {
            gerenciarLogin();
        }
    });

    function gerenciarLogin() {
        const user = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
        const pass = document.getElementById('login-pass').value.trim();
        if(user === LOGIN_ADM && pass === SENHA_ADM) {
            irPara('view-painel');
        } else {
            consultarCarro();
        }
    }

    function consultarCarro() {
        const user = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
        const pass = document.getElementById('login-pass').value.trim();
        const placa = document.getElementById('login-placa').value.trim().toUpperCase();
        const res = document.getElementById('resultado-cliente');

        if(!user || !pass || !placa) return showAlert("⚠️ PREENCHA TUDO");

        db.ref('usuarios/' + user).once('value', (snap) => {
            if(snap.exists() && snap.val().senha === pass) {
                db.ref('veiculos/' + placa).once('value', (sV) => {
                    const v = sV.val();
                    if(v && v.identificacao === user) {
                        const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");
                        res.innerHTML = `
                            <div style="margin-top:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border);">
                                <h3 style="color:var(--primary)">${v.modelo}</h3>
                                <p>Status: <b style="color:${cor}">${v.status}</b></p>
                                <p style="margin:15px 0; font-size:14px;">${v.obs}</p>
                                <p style="color:var(--success); font-weight:bold; font-size:18px">R$ ${v.preco}</p>
                                <div class="fotos-grid">${(v.fotos || []).map(f => `<img src="${f}" onclick="abrirImg('${f}')" class="img-item">`).join('')}</div>
                            </div>
                            <a href="https://wa.me/55${v.clienteZap || ''}" target="_blank" class="btn-main" style="background:#25d366; margin-top:20px;">FALAR COM A MECÂNICA</a>
                            <button onclick="location.reload()" class="btn-main" style="background:#132a47; margin-top:10px;">VOLTAR</button>`;
                        document.getElementById('area-busca').classList.add('hidden');
                    } else { showAlert("🔍 NÃO ENCONTRADO"); }
                });
            } else { showAlert("❌ LOGIN INCORRETO"); }
        });
    }

    db.ref('veiculos').on('value', (s) => { bancoDados = s.val() || {}; desenharTabela(); });
    db.ref('servicos_ativos').on('value', (s) => { bancoSolicitacoes = s.val() || {}; desenharSolicitacoes(); });

    function desenharSolicitacoes() {
        const c = document.getElementById('lista-solicitacoes');
        c.innerHTML = "";
        Object.keys(bancoSolicitacoes).forEach(id => {
            const s = bancoSolicitacoes[id];
            c.innerHTML += `<div class="solicitacao-item"><b>${s.placa}</b> - ${s.modelo}<br><button class="btn-main" style="padding:8px; font-size:11px; margin-top:10px" onclick="importarSolicitacao('${id}')">EDITAR</button></div>`;
        });
    }

    function importarSolicitacao(id) {
        const s = bancoSolicitacoes[id];
        document.getElementById('m-placa').value = s.placa;
        document.getElementById('m-modelo').value = `${s.modelo} - ${s.ano}`;
        document.getElementById('m-identificacao-interna').value = s.cliente_id || "";
        whatsappAtual = s.zap_cliente || "";
        nomeClienteAtual = s.nome_cliente || "";
        relatoClienteAtual = s.problema || "";
        exibirBotaoWhats(whatsappAtual, nomeClienteAtual, relatoClienteAtual);
    }

    function exibirBotaoWhats(zap, nome, problema) {
        document.getElementById('relatorio-cliente-view').style.display = "block";
        document.getElementById('btn-whats-direto').style.display = "flex"; 
        document.getElementById('txt-relato-cliente').innerHTML = `<b>${nome}:</b> ${problema}`;
        document.getElementById('btn-whats-direto').onclick = () => window.open(`https://wa.me/55${zap.replace(/\D/g,"")}`, '_blank');
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const dados = {
            modelo: document.getElementById('m-modelo').value,
            status: statusSelecionado,
            preco: document.getElementById('m-preco').value,
            obs: document.getElementById('m-obs').value,
            fotos: fotosBase64,
            clienteZap: whatsappAtual,
            clienteNome: nomeClienteAtual,
            clienteRelato: relatoClienteAtual,
            identificacao: document.getElementById('m-identificacao-interna').value 
        };
        if(!placa || !dados.preco) return showAlert("❌ FALTA DADOS");
        db.ref('veiculos/' + placa).set(dados).then(() => {
            db.ref('servicos_ativos/' + placa).remove();
            showAlert("✔️ SALVO");
            limparFormulario();
        });
    }

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).reverse().forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");
            corpo.innerHTML += `<tr><td><b>${p}</b><br>${v.modelo}</td><td style="color:${cor}">${v.status}</td><td style="text-align:right">
                <button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer;">✏️</button>
                <button onclick="confirmarExcluir('${p}')" style="background:none; border:none; cursor:pointer; margin-left:10px">🗑️</button></td></tr>`;
        });
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco;
        document.getElementById('m-obs').value = v.obs;
        document.getElementById('m-identificacao-interna').value = v.identificacao || "";
        fotosBase64 = v.fotos || [];
        renderizarFotosEdicao();
        document.getElementById('btn-cancelar').classList.remove('hidden');
    }

    function renderizarFotosEdicao() {
        const area = document.getElementById('preview-area');
        area.innerHTML = "";
        fotosBase64.forEach((src, i) => {
            area.innerHTML += `<div style="position:relative"><img src="${src}" class="img-item"><button onclick="removerFoto(${i})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer">X</button></div>`;
        });
    }

    function removerFoto(i) { fotosBase64.splice(i,1); renderizarFotosEdicao(); }

    function limparFormulario() {
        ['m-placa','m-modelo','m-preco','m-obs','m-identificacao-interna'].forEach(id => document.getElementById(id).value = "");
        fotosBase64 = []; renderizarFotosEdicao();
        document.getElementById('btn-cancelar').classList.add('hidden');
        document.getElementById('relatorio-cliente-view').style.display = "none";
        document.getElementById('btn-whats-direto').style.display = "none";
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        Array.from(files).forEach(f => {
            const r = new FileReader();
            r.onload = (e) => { fotosBase64.push(e.target.result); renderizarFotosEdicao(); };
            r.readAsDataURL(f);
        });
    }

    function filtrarTabela(f, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        desenharTabela(f);
    }

    function showAlert(m) { const a = document.getElementById('custom-alert'); a.innerText = m; a.style.display = 'block'; setTimeout(() => a.style.display='none', 2000); }
    function mascaraMoeda(i) { let v = i.value.replace(/\D/g,''); v = (v/100).toFixed(2).replace(".",","); i.value = v; }
    function irPara(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    function setStatus(el) { document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); statusSelecionado = el.getAttribute('data-status'); }
    function abrirImg(s) { document.getElementById('modal-view').src = s; document.getElementById('img-modal').style.display = 'flex'; }
    function fecharConfirm() { document.getElementById('confirm-box').classList.add('hidden'); }
    
    let pExcluir = null; let acao = "";
    function confirmarExcluir(p) { pExcluir = p; acao = "u"; document.getElementById('confirm-box').classList.remove('hidden'); }
    function confirmarLimparTudo() { acao = "t"; document.getElementById('confirm-box').classList.remove('hidden'); }
    document.getElementById('btn-confirm-sim').onclick = () => {
        if(acao === "u") db.ref('veiculos/' + pExcluir).remove().then(fecharConfirm);
        else db.ref('veiculos').remove().then(fecharConfirm);
    };
</script>
</body>
</html>
