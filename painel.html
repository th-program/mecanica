<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET BASE ===== */
html, body {
    height: 100%;
    overflow-x: hidden;
}

/* ===== BODY AJUSTADO MOBILE ===== */
body { 
    font-family: 'Segoe UI', Roboto, sans-serif; 
    background-color: var(--bg); 
    color: var(--text-main); 

    display: flex; 
    justify-content: center; 
    align-items: flex-start;

    min-height: 100dvh; /* CORREÇÃO PRINCIPAL */
    padding: 15px 10px 80px; /* espaço inferior */
}

/* ===== CONTAINER FLEXÍVEL ===== */
.container { 
    width: 100%; 
    max-width: 100%; 
    margin-top: 60px; 
    padding: 0 5px;
}

/* ===== PAINEL ADMIN RESPONSIVO ===== */
#view-painel.card { 
    width: 100%; 
    max-width: 100%;
}

/* ===== GRID MOBILE CORRIGIDO ===== */
.painel-grid { 
    display: grid; 
    grid-template-columns: 1fr; 
    gap: 20px; 
}

/* ===== TABELA RESPONSIVA ===== */
.table-container { 
    max-height: 300px; 
    overflow-y: auto; 
    overflow-x: auto; /* evita corte lateral */
}

/* ===== BOTÃO FIXO AJUSTADO ===== */
.btn-home-fixed {
    position: fixed;
    top: 10px;
    left: 10px;
    padding: 8px 12px;
    font-size: 12px;
    z-index: 999;
}

/* ===== INPUTS MOBILE ===== */
input, textarea, select {
    font-size: 16px !important; /* evita zoom automático */
}

/* ===== IMAGENS RESPONSIVAS ===== */
img {
    max-width: 100%;
    height: auto;
}

/* ===== MOBILE ESPECÍFICO ===== */
@media (max-width: 767px) {

    body {
        padding: 10px 8px 100px;
    }

    .container {
        margin-top: 50px;
    }

    #view-painel .painel-col:last-child {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 15px;
        padding: 15px;
    }

    .status-picker {
        grid-template-columns: 1fr 1fr;
    }

    .categorias-filtro {
        gap: 6px;
    }

    .cat-btn {
        font-size: 10px;
        padding: 8px 12px;
    }
}

/* ===== DESKTOP ===== */
@media (min-width: 768px) {
    .container { 
        max-width: 900px; 
        margin-top: 0;
    }

    .painel-grid { 
        grid-template-columns: 1.2fr 0.8fr; 
    }
}
</style>
</head>
<body>

<a href="index.html" class="btn-home-fixed" onclick="location.reload()">
    <span>🏠</span> INÍCIO
</a>

<div id="custom-alert" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>

<div id="img-modal" onclick="this.style.display='none'"><img id="modal-view" src=""><div style="position: absolute; top: 20px; right: 20px; color: #fff; font-size: 20px;">✕</div></div>

<div id="confirm-box" class="confirm-box"><div class="card" style="max-width: 320px; text-align: center;"><h3 id="confirm-title" style="color:var(--danger); margin-bottom: 15px; font-size: 16px;">CONFIRMAR EXCLUSÃO?</h3><p style="font-size: 12px; color: var(--text-dim); margin-bottom: 20px;">Esta ação não pode ser desfeita.</p><button class="btn-main" id="btn-confirm-sim" style="background: var(--danger); margin-bottom: 10px; color: #fff;">SIM, EXCLUIR</button><button class="btn-main" onclick="fecharConfirm()" style="background: #222; color: #fff;">CANCELAR</button></div></div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img" alt="Lima Car Logo"></div>
        
        <div id="area-busca">
            <label>Consulte seu veículo</label>
            <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="Sua Placa" onkeyup="if(event.key==='Enter') consultarCarro()">
            <button class="btn-main" id="btn-localizar" onclick="consultarCarro()">Localizar Veículo</button>
        </div>

        <div id="resultado-cliente"></div>
        
        <div id="botoes-acao-cliente">
            <button id="btn-solicitar-cadastro" onclick="irPara('view-cadastro-cliente')" class="btn-main" style="background: #25d366; color: white; margin-top: 20px;">SOLICITAR MANUTENÇÃO (CADASTRO)</button>
            <a id="btn-falar-oficina" href="https://wa.me/5500000000000" target="_blank" class="btn-main hidden" style="background: #25d366; color: white; margin-top: 20px;">FALAR COM A OFICINA</a>
            <button id="btn-voltar-busca" onclick="location.reload()" class="btn-main hidden" style="background: #132a47; color: white; margin-top: 10px;">VOLTAR PARA CONSULTA</button>
        </div>

        <center><button onclick="irPara('view-login')" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text-dim); margin-top:40px; padding: 10px 20px; border-radius: 20px; font-size:11px; font-weight:700; cursor:pointer; letter-spacing: 1px;">🔒 ACESSO RESTRITO</button></center>
    </section>

    <section id="view-cadastro-cliente" class="card hidden">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:25px; letter-spacing: 2px;">NOVO CADASTRO</h2>
        <label>Nome Completo</label><input type="text" id="c-nome" placeholder="Seu nome">
        <label>WhatsApp</label><input type="tel" id="c-zap" placeholder="(00) 00000-0000">
        <label>Placa do Carro</label><input type="text" id="c-placa" maxlength="7" placeholder="ABC1D23" style="text-transform: uppercase;">
        <label>Modelo do Carro</label><input type="text" id="c-modelo" placeholder="Ex: Gol G5">
        <label>Problemas Apresentados</label><textarea id="c-problema" rows="4" placeholder="O que o carro tem?"></textarea>
        <button class="btn-main" onclick="clienteEnviarCadastro()">ENVIAR PARA OFICINA</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:25px; cursor:pointer; font-size:14px; font-weight: bold;">← Voltar</button></center>
    </section>

    <section id="view-login" class="card hidden">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <label style="text-align: center;">Chave de Acesso</label>
        <input type="password" id="pass-admin" placeholder="••••" style="text-align: center; font-size: 28px!important; letter-spacing: 10px;" onkeyup="if(event.key==='Enter') logar()">
        <button class="btn-main" onclick="logar()">Entrar no Sistema</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:25px; cursor:pointer; font-size:14px; font-weight: bold;">← Voltar</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h2 style="font-size:16px; color:var(--primary); letter-spacing: 1px;">PÁGINA DO MECÂNICO</h2>
            <button onclick="location.reload()" style="color:var(--danger); background:rgba(231, 76, 60, 0.1); border:1px solid var(--danger); padding: 8px 15px; border-radius: 10px; font-weight:bold; font-size:11px; cursor:pointer;">SAIR (ESC)</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col">
                <div id="aba-novos-cadastros">
                    <label style="color:var(--success); margin-bottom: 15px;">📩 Novas Solicitações</label>
                    <div id="lista-solicitacoes"></div>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
                    <div class="categorias-filtro">
                        <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                        <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Na Fila</button>
                        <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                        <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>
                    </div>
                    <button onclick="confirmarLimparTudo()" style="background:none; border:none; cursor:pointer; font-size:22px;" title="Apagar todos os cadastros">🗑️</button>
                </div>

                <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                    <table id="corpo-tabela" style="width: 100%; border-collapse: collapse;"></table>
                </div>
            </div>

            <div class="painel-col">
                <button id="btn-whats-direto" class="btn-main whatsapp-float-btn" style="display:none;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="18" style="filter: brightness(0) invert(1);"> 
                    FALAR COM CLIENTE
                </button>

                <div id="relatorio-cliente-view" class="relatorio-cliente-box">
                    <b style="color:var(--primary)">RELATO DO CLIENTE:</b><br>
                    <span id="txt-relato-cliente" style="font-size: 13px; line-height: 1.5;"></span>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                    <div><label>Placa</label><input type="text" id="m-placa" maxlength="7" readonly style="opacity: 0.6; cursor: not-allowed;"></div>
                    <div><label>Valor (R$)</label><input type="text" id="m-preco" placeholder="0,00" oninput="mascaraMoeda(this)"></div>
                </div>
                
                <label>Modelo do Veículo</label>
                <input type="text" id="m-modelo" readonly style="opacity: 0.6; cursor: not-allowed;">
                
                <label>Fotos (Estado do Carro)</label>
<label for="m-fotos-input" class="btn-upload-custom" id="label-upload">📸 CLIQUE PARA ENVIAR FOTOS</label>
<input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()" style="display: none;">
<div id="preview-area" class="fotos-grid"></div>

                <label>Status da Manutenção</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Mão na Massa</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                </div>

                <label>Relatório Técnico</label>
                <div class="servicos-sugeridos" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;">
                    <span class="tag-servico" style="font-size: 10px; background: #132a47; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border);" onclick="addServico('Revisão Preventiva Premium')">+ Revisão</span>
                    <span class="tag-servico" style="font-size: 10px; background: #132a47; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border);" onclick="addServico('Troca de Óleo e Filtros')">+ Óleo</span>
                    <span class="tag-servico" style="font-size: 10px; background: #132a47; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border);" onclick="addServico('Diagnóstico via Scanner')">+ Scanner</span>
                </div>
                <textarea id="m-obs" rows="4" placeholder="Descreva o que foi feito no carro..."></textarea>
                
                <button class="btn-main" onclick="salvar()">✅ Salvar Registro (ENTER)</button>
                <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#222; border: 1px solid #444; color:white; margin-top:12px">Descartar Edição</button>
                
                <div class="mobile-spacer"></div>
            </div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
        messagingSenderId: "COLE_AQUI",
        appId: "COLE_AQUI"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const CHAVE_MESTRA = "1234";
    let statusSelecionado = "Aguardando";
    let bancoDados = {}; 
    let bancoSolicitacoes = {};
    let editandoPlaca = null;
    let fotosBase64 = [];
    let whatsappAtual = "";
    let nomeClienteAtual = "";
    let relatoClienteAtual = "";

    // CONSULTAR CARRO - COM LÓGICA DE BOTÕES SOLICITADA
    function consultarCarro() {
        const p = document.getElementById('login-placa').value.toUpperCase().trim();
        const res = document.getElementById('resultado-cliente');
        const areaBusca = document.getElementById('area-busca');
        const btnSolicitar = document.getElementById('btn-solicitar-cadastro');
        const btnFalarOficina = document.getElementById('btn-falar-oficina');
        const btnVoltarBusca = document.getElementById('btn-voltar-busca');

        if(bancoDados[p]) {
            const v = bancoDados[p];
            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");
            let fotosHtml = (v.fotos && v.fotos.length > 0) ? `<div class="fotos-grid">${v.fotos.map(f => `<img src="${f}" onclick="abrirImg('${f}')" class="img-item">`).join('')}</div>` : "";
            
            // Exibe resultado
            res.innerHTML = `<div style="margin-top:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border);">
                <h3 style="color:var(--primary)">${v.modelo}</h3><p>Status: <b style="color:${cor}">${v.status}</b></p>
                <p style="font-size:14px; margin:15px 0; line-height:1.4">${v.obs}</p><p style="color:var(--success); font-weight:bold; font-size:18px">Total: R$ ${v.preco}</p>${fotosHtml}</div>`;
            
            // Alterna botões
            areaBusca.classList.add('hidden');
            btnSolicitar.classList.add('hidden');
            btnFalarOficina.classList.remove('hidden');
            btnVoltarBusca.classList.remove('hidden');

        } else { 
            showAlert("🔍 NÃO LOCALIZADO"); 
        }
    }

    // MANUTENÇÃO DOS DEMAIS SCRIPTS ORIGINAIS
    document.addEventListener('keydown', (e) => {
        if(e.key === "Escape") {
            if(document.getElementById('img-modal').style.display === 'flex') {
                document.getElementById('img-modal').style.display = 'none';
            } else if(document.getElementById('confirm-box').style.display === 'flex') {
                fecharConfirm();
            } else if(!document.getElementById('view-painel').classList.contains('hidden')) {
                limparFormulario();
            }
        }
        if(e.key === "Enter" && !document.getElementById('view-painel').classList.contains('hidden')) {
            if(document.activeElement.tagName !== 'TEXTAREA') salvar();
        }
    });

    db.ref('veiculos').on('value', (snapshot) => {
        bancoDados = snapshot.val() || {};
        desenharTabela();
    });

    db.ref('pre_cadastros').on('value', (snapshot) => {
        bancoSolicitacoes = snapshot.val() || {};
        desenharSolicitacoes();
    });

    function clienteEnviarCadastro() {
        const nome = document.getElementById('c-nome').value.trim();
        const zap = document.getElementById('c-zap').value.trim();
        const placa = document.getElementById('c-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('c-modelo').value.trim();
        const problema = document.getElementById('c-problema').value.trim();
        if(!nome || !placa || !modelo || !problema) return showAlert("❌ PREENCHA TODOS OS CAMPOS");
        if(placa.length < 7) return showAlert("❌ PLACA INVÁLIDA");
        db.ref('pre_cadastros/' + placa).set({
            nome, zap, placa, modelo, problema, data: new Date().toLocaleString()
        }).then(() => {
            showAlert("✔️ ENVIADO COM SUCESSO!");
            irPara('view-cliente');
            document.querySelectorAll('#view-cadastro-cliente input, #view-cadastro-cliente textarea').forEach(i => i.value = "");
        });
    }

    function desenharSolicitacoes() {
        const container = document.getElementById('lista-solicitacoes');
        container.innerHTML = "";
        const keys = Object.keys(bancoSolicitacoes);
        if(keys.length === 0) {
            container.innerHTML = '<p style="font-size:12px; color:var(--text-dim)">Nenhuma nova solicitação...</p>';
            return;
        }
        keys.forEach(id => {
            const s = bancoSolicitacoes[id];
            container.innerHTML += `
                <div class="solicitacao-item">
                    <b style="color:var(--primary)">${s.placa} - ${s.modelo}</b><br>
                    <span style="font-size:12px">Cliente: ${s.nome}</span><br>
                    <button class="btn-main" style="padding:8px; font-size:11px; margin-top:10px" onclick="importarSolicitacao('${id}')">EDITAR VEÍCULO</button>
                </div>
            `;
        });
    }

    function importarSolicitacao(id) {
        const s = bancoSolicitacoes[id];
        document.getElementById('m-placa').value = s.placa;
        document.getElementById('m-modelo').value = s.modelo;
        whatsappAtual = s.zap;
        nomeClienteAtual = s.nome;
        relatoClienteAtual = s.problema;
        exibirBotaoWhats(s.zap, s.nome, s.problema);
        showAlert("📋 DADOS CARREGADOS");
    }

    function exibirBotaoWhats(zap, nome, problema) {
        const boxRelato = document.getElementById('relatorio-cliente-view');
        const btnWhats = document.getElementById('btn-whats-direto');
        boxRelato.style.display = "block";
        btnWhats.style.display = "flex"; 
        document.getElementById('txt-relato-cliente').innerHTML = `<b>Nome:</b> ${nome}<br><b>Problema:</b> ${problema}`;
        const numLimpo = zap.replace(/\D/g, "");
        btnWhats.onclick = () => { window.open(`https://wa.me/55${numLimpo}`, '_blank'); };
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('m-modelo').value.trim();
        const preco = document.getElementById('m-preco').value;
        const obs = document.getElementById('m-obs').value;
        if(!placa || !modelo || !preco || !obs) return showAlert("❌ PREENCHA TUDO");
        const dados = {
            modelo, status: statusSelecionado, preco, obs,
            fotos: fotosBase64,
            clienteZap: whatsappAtual,
            clienteNome: nomeClienteAtual,
            clienteRelato: relatoClienteAtual
        };
        db.ref('veiculos/' + placa).set(dados).then(() => {
            if(bancoSolicitacoes[placa]) db.ref('pre_cadastros/' + placa).remove();
            showAlert("✔️ SALVO COM SUCESSO");
            limparFormulario();
        });
    }

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).reverse().forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");
            corpo.innerHTML += `<tr><td><b style="color:var(--primary)">${p}</b><br>${v.modelo}</td><td style="color:${cor}; font-weight:bold;">${v.status}</td>
                <td style="text-align:right">
                <button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer; font-size:16px; margin-right:10px;">✏️</button>
                <button onclick="confirmarExcluir('${p}')" style="background:none; border:none; cursor:pointer; font-size:16px;">🗑️</button></td></tr>`;
        });
    }

    function prepararEdicao(p) {
        const v = bancoDados[p]; editandoPlaca = p;
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco;
        document.getElementById('m-obs').value = v.obs;
        document.getElementById('btn-cancelar').classList.remove('hidden');
        fotosBase64 = v.fotos || [];
        renderizarFotosEdicao();
        if(v.clienteZap) {
            whatsappAtual = v.clienteZap;
            nomeClienteAtual = v.clienteNome;
            relatoClienteAtual = v.clienteRelato;
            exibirBotaoWhats(v.clienteZap, v.clienteNome, v.clienteRelato);
        } else {
            document.getElementById('relatorio-cliente-view').style.display = "none";
            document.getElementById('btn-whats-direto').style.display = "none";
        }
    }

    function renderizarFotosEdicao() {
        const area = document.getElementById('preview-area');
        area.innerHTML = "";
        fotosBase64.forEach((src, index) => {
            const div = document.createElement('div');
            div.className = "img-item-wrapper";
            div.innerHTML = `<img src="${src}" onclick="abrirImg('${src}')" class="img-item">
                <button style="position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold;" onclick="removerFoto(${index})">X</button>`;
            area.appendChild(div);
        });
        document.getElementById('label-upload').innerText = fotosBase64.length > 0 ? `📸 ${fotosBase64.length} FOTO(S)` : "📸 ENVIAR FOTOS";
    }

    function removerFoto(index) { fotosBase64.splice(index, 1); renderizarFotosEdicao(); }

    function limparFormulario() {
        editandoPlaca = null; fotosBase64 = []; whatsappAtual = ""; nomeClienteAtual = ""; relatoClienteAtual = "";
        ['m-placa','m-modelo','m-preco','m-obs','m-fotos-input'].forEach(id => {
            const el = document.getElementById(id); if(el) el.value = "";
        });
        document.getElementById('preview-area').innerHTML = "";
        document.getElementById('label-upload').innerText = "📸 ENVIAR FOTOS";
        document.getElementById('btn-cancelar').classList.add('hidden');
        document.getElementById('relatorio-cliente-view').style.display = "none";
        document.getElementById('btn-whats-direto').style.display = "none";
    }

    function filtrarTabela(f, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        desenharTabela(f);
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => { fotosBase64.push(e.target.result); renderizarFotosEdicao(); };
            reader.readAsDataURL(file);
        });
    }

    function addServico(texto) { const campo = document.getElementById('m-obs'); campo.value += (campo.value ? " | " : "") + texto; }
    function showAlert(msg) { const div = document.getElementById('custom-alert'); div.innerText = msg; div.style.display = 'block'; setTimeout(() => { div.style.display = 'none'; }, 2000); }
    function mascaraMoeda(i) { let v = i.value.replace(/\D/g,''); v = (v/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, "."); i.value = v; }
    function irPara(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); }
    function logar() { if(document.getElementById('pass-admin').value === CHAVE_MESTRA) irPara('view-painel'); else showAlert("⚠️ CHAVE INCORRETA"); }
    function setStatus(el) { document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); statusSelecionado = el.getAttribute('data-status'); }
    function abrirImg(src) { document.getElementById('modal-view').src = src; document.getElementById('img-modal').style.display = 'flex'; }
    function fecharConfirm() { document.getElementById('confirm-box').style.display = 'none'; }
    
    let placaParaExcluir = null;
    let acaoExclusao = "";
    function confirmarExcluir(p) { placaParaExcluir = p; acaoExclusao = "unico"; document.getElementById('confirm-title').innerText = "EXCLUIR ESTE VEÍCULO?"; document.getElementById('confirm-box').style.display = 'flex'; }
    function confirmarLimparTudo() { acaoExclusao = "todos"; document.getElementById('confirm-title').innerText = "APAGAR TUDO DEFINITIVAMENTE?"; document.getElementById('confirm-box').style.display = 'flex'; }
    document.getElementById('btn-confirm-sim').onclick = () => {
        if(acaoExclusao === "unico") { db.ref('veiculos/' + placaParaExcluir).remove().then(() => fecharConfirm()); }
        else { db.ref('veiculos').remove().then(() => { fecharConfirm(); showAlert("⚠️ SISTEMA LIMPO"); }); }
    };
</script>
</body>
</html>
