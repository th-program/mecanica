<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

    <title>Mecânica Lima Car | Gestão Profissional</title>

    <style>

        /* Cole aqui todo o seu CSS original */

        :root { --bg: #000b1a; --card-bg: rgba(0, 21, 43, 0.9); --primary: #d4af37; --text-main: #f0f0f0; --text-dim: #a0aec0; --border: #132a47; --success: #00ff88; --warning: #ffcc00; --danger: #ff4d4d; --input-bg: rgba(0, 30, 61, 0.7); --logo-size: 220px; } * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; overflow-x: hidden; } #view-cliente { background-image: linear-gradient(to bottom, rgba(0,11,26,0.8), rgba(0,11,26,0.95)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); } #view-painel { background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); } .container { width: 100%; max-width: 450px; } section { display: block; animation: fadeIn 0.4s ease-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 25px; padding: 25px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(12px); border-top: 2px solid var(--primary); } .logo-box { text-align: center; margin: -25px -25px 20px -25px; background: #000; border-bottom: 2px solid var(--primary); border-radius: 24px 24px 0 0; padding: 15px; } .logo-img { width: 100%; max-width: var(--logo-size); height: auto; display: block; margin: 0 auto; } label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; } input, textarea, select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 15px !important; margin-bottom: 12px; transition: 0.3s; } input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); } .btn-upload-custom { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px dashed var(--primary); color: var(--primary); padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 13px; transition: 0.3s; } .btn-upload-custom:hover { background: rgba(212, 175, 55, 0.1); } input[type="file"] { display: none; } .input-placa-grande { font-family: 'Monaco', monospace; font-size: 32px !important; background: #fff !important; color: #000 !important; border: 5px solid #333 !important; text-transform: uppercase; letter-spacing: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); text-align: center; } .btn-main { background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); color: #000; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); } .btn-main:active { transform: scale(0.96); } .categorias-filtro { display: flex; gap: 5px; margin-top: 25px; overflow-x: auto; padding-bottom: 10px; } .cat-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: 0.3s; } .cat-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.1); } .btn-zap { background: #25d366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 13px; } .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; } .status-option { background: rgba(0, 30, 61, 0.5); border: 1px solid var(--border); padding: 10px 2px; border-radius: 10px; text-align: center; font-size: 9px; font-weight: 800; cursor: pointer; color: var(--text-dim); transition: 0.3s; } .status-option.active { transform: scale(1.05); } .status-option.active[data-status="Aguardando"] { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); } .status-option.active[data-status="Trabalhando"] { border-color: var(--warning); color: var(--warning); background: rgba(241, 196, 15, 0.1); } .status-option.active[data-status="Pronto"] { border-color: var(--success); color: var(--success); background: rgba(46, 204, 113, 0.1); } .servicos-sugeridos { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; } .tag-servico { font-size: 9px; background: #132a47; padding: 4px 8px; border-radius: 15px; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); } .tag-servico:hover { border-color: var(--primary); color: #fff; } .table-container { margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; } table { width: 100%; border-collapse: collapse; } td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 12px; } .hidden { display: none; } #img-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); cursor: zoom-out; } #modal-view { max-width: 95%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 2px solid var(--primary); } .fotos-grid { display: grid; gap: 8px; margin-top: 10px; grid-template-columns: repeat(2, 1fr); } @media (min-width: 600px) { .fotos-grid { grid-template-columns: 1fr; } .fotos-grid img { height: 150px !important; } } .img-item { width: 100%; height: 100px; object-fit: cover; border-radius: 12px; border: 2px solid var(--border); cursor: pointer; transition: 0.3s; } .img-item:hover { border-color: var(--primary); transform: scale(1.02); } #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); } .confirm-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 10001; backdrop-filter: blur(8px); }

    </style>

</head>

<body>



<div id="custom-alert"></div>

<div id="img-modal" onclick="this.style.display='none'"><img id="modal-view" src=""><div style="position: absolute; top: 20px; right: 20px; color: #fff; font-size: 20px;">✕</div></div>

<div id="confirm-box" class="confirm-box"><div class="card" style="max-width: 320px; text-align: center;"><h3 style="color:var(--danger); margin-bottom: 15px; font-size: 16px;">CONFIRMAR EXCLUSÃO?</h3><p style="font-size: 12px; color: var(--text-dim); margin-bottom: 20px;">Esta ação não pode ser desfeita.</p><button class="btn-main" id="btn-confirm-sim" style="background: var(--danger); margin-bottom: 10px; color: #fff;">SIM, EXCLUIR</button><button class="btn-main" onclick="fecharConfirm()" style="background: #222; color: #fff;">CANCELAR</button></div></div>



<div class="container">

    <section id="view-cliente" class="card">

        <div class="logo-box"><img src="logo.jpg" class="logo-img" alt="Lima Car Logo"></div>

        <label>Consulte seu veículo</label>

        <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1D23" onkeydown="if(event.key==='Enter') consultarCarro()">

        <button class="btn-main" onclick="consultarCarro()">Localizar Veículo</button>

        <div id="resultado-cliente"></div>

        <a href="https://wa.me/5511999999999" target="_blank" class="btn-zap">CONTATO VIA WHATSAPP</a>

        <center><button onclick="irPara('view-login')" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text-dim); margin-top:30px; padding: 6px 15px; border-radius: 20px; font-size:10px; font-weight:700; cursor:pointer;">🔒 ACESSO RESTRITO</button></center>

    </section>



    <section id="view-login" class="card hidden">

        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>

        <label>Chave de Acesso</label>

        <input type="password" id="pass-admin" placeholder="••••" style="text-align: center; font-size: 24px!important;" onkeydown="if(event.key==='Enter') logar()">

        <button class="btn-main" onclick="logar()">Entrar no Sistema</button>

        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer; font-size:12px;">Voltar</button></center>

    </section>



    <section id="view-painel" class="card hidden">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">

            <h2 style="font-size:14px; color:var(--primary)">PÁGINA DO MECÂNICO</h2>

            <button onclick="location.reload()" style="color:var(--danger); background:rgba(231, 76, 60, 0.1); border:none; padding: 5px 10px; border-radius: 8px; font-weight:bold; font-size:10px;">SAIR</button>

        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">

            <div><label>Placa</label><input type="text" id="m-placa" maxlength="7" placeholder="Ex: BRA2E19"></div>

            <div><label>Valor (R$)</label><input type="text" id="m-preco" placeholder="0,00" oninput="mascaraMoeda(this)"></div>

        </div>

        <label>Modelo do Veículo</label><input type="text" id="m-modelo" placeholder="Ex: Corolla XEI 2024">

        <label>Fotos (Estado do Carro)</label>

        <label for="m-fotos-input" class="btn-upload-custom" id="label-upload">📸 CLIQUE PARA ENVIAR FOTOS</label>

        <input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()">

        <div id="preview-area" class="fotos-grid"></div>

        <label>Status da Manutenção</label>

        <div class="status-picker">

            <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>

            <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Mão na Massa</div>

            <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>

        </div>

        <label>Relatório Técnico</label>

        <div class="servicos-sugeridos">

            <span class="tag-servico" onclick="addServico('Revisão Preventiva Premium')">+ Revisão</span>

            <span class="tag-servico" onclick="addServico('Troca de Óleo e Filtros')">+ Óleo</span>

            <span class="tag-servico" onclick="addServico('Diagnóstico via Scanner')">+ Scanner</span>

            <span class="tag-servico" onclick="addServico('Sistema de Freios OK')">+ Freios</span>

        </div>

        <textarea id="m-obs" rows="3" placeholder="Descreva o que foi feito no carro..."></textarea>

        <button class="btn-main" onclick="salvar()">✅ Salvar Registro</button>

        <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#333; color:white; margin-top:8px">Descartar Edição</button>

        <div class="categorias-filtro">

            <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>

            <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Na Fila</button>

            <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>

            <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>

        </div>

        <div class="table-container"><table id="corpo-tabela"></table></div>

    </section>

</div>



<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>



<script>

    // 2. CONFIGURAÇÃO (Substitua pelos dados que você encontrar no "Configurações do Projeto")

    const firebaseConfig = {

        apiKey: "COLE_AQUI",

        authDomain: "a-fonte-43744.firebaseapp.com",

        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",

        projectId: "a-fonte-43744",

        storageBucket: "a-fonte-43744.appspot.com",

        messagingSenderId: "COLE_AQUI",

        appId: "COLE_AQUI"

    };



    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();



    const CHAVE_MESTRA = "1234";

    let statusSelecionado = "Aguardando";

    let bancoDados = {}; 

    let editandoPlaca = null;

    let fotosBase64 = [];



    // 3. SINCRONIZAÇÃO AUTOMÁTICA

    db.ref('veiculos').on('value', (snapshot) => {

        bancoDados = snapshot.val() || {};

        desenharTabela(); // Atualiza a lista do mecânico no PC e Celular na hora

    });



    // Funções Auxiliares (Mantenha igual ao seu)

    function addServico(texto) { const campo = document.getElementById('m-obs'); campo.value += (campo.value ? " | " : "") + texto; }

    function showAlert(msg) { const div = document.getElementById('custom-alert'); div.innerText = msg; div.style.display = 'block'; setTimeout(() => { div.style.display = 'none'; }, 2000); }

    function mascaraMoeda(i) { let v = i.value.replace(/\D/g,''); v = (v/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, "."); i.value = v; }

    

    function previewImages() {

        const files = document.getElementById('m-fotos-input').files;

        const area = document.getElementById('preview-area');

        area.innerHTML = ""; fotosBase64 = [];

        if(files.length > 0) document.getElementById('label-upload').innerText = `📸 ${files.length} FOTO(S)`;

        Array.from(files).forEach(file => {

            const reader = new FileReader();

            reader.onload = (e) => {

                const img = document.createElement('img'); img.src = e.target.result; img.className = "img-item";

                img.onclick = () => abrirImg(e.target.result); area.appendChild(img);

                fotosBase64.push(e.target.result);

            };

            reader.readAsDataURL(file);

        });

    }



    function irPara(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

    function logar() { if(document.getElementById('pass-admin').value === CHAVE_MESTRA) irPara('view-painel'); else showAlert("⚠️ CHAVE INCORRETA"); }

    function setStatus(el) { document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active')); el.classList.add('active'); statusSelecionado = el.getAttribute('data-status'); }



    // 4. SALVAR NO FIREBASE

    function salvar() {

        const placa = document.getElementById('m-placa').value.toUpperCase().trim();

        const modelo = document.getElementById('m-modelo').value.trim();

        const preco = document.getElementById('m-preco').value;

        const obs = document.getElementById('m-obs').value;



        if(placa.length < 7 || !modelo || !preco || !obs) return showAlert("❌ PREENCHA TUDO");

        

        const dados = {

            modelo, status: statusSelecionado, preco, obs,

            fotos: fotosBase64.length > 0 ? fotosBase64 : (editandoPlaca && bancoDados[placa] ? (bancoDados[placa].fotos || []) : [])

        };



        db.ref('veiculos/' + placa).set(dados).then(() => {

            showAlert("✔️ SALVO NA NUVEM");

            limparFormulario();

        });

    }



    function desenharTabela(filtro = "Todos") {

        const corpo = document.getElementById('corpo-tabela');

        corpo.innerHTML = "";

        Object.keys(bancoDados).reverse().forEach(p => {

            const v = bancoDados[p];

            if(filtro !== "Todos" && v.status !== filtro) return;

            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");

            corpo.innerHTML += `<tr><td><b style="color:var(--primary)">${p}</b><br>${v.modelo}</td><td style="color:${cor}">${v.status}</td>

                <td style="text-align:right"><button onclick="prepararEdicao('${p}')">✏️</button>

                <button onclick="confirmarExcluir('${p}')" style="color:var(--danger)">🗑️</button></td></tr>`;

        });

    }



    function consultarCarro() {

        const p = document.getElementById('login-placa').value.toUpperCase().trim();

        const res = document.getElementById('resultado-cliente');

        if(bancoDados[p]) {

            const v = bancoDados[p];

            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");

            let fotosHtml = v.fotos ? `<div class="fotos-grid">${v.fotos.map(f => `<img src="${f}" onclick="abrirImg('${f}')" class="img-item">`).join('')}</div>` : "";

            res.innerHTML = `<div style="margin-top:20px; background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid var(--border);">

                <h3 style="color:var(--primary)">${v.modelo}</h3><p>Status: <b style="color:${cor}">${v.status}</b></p>

                <p style="font-size:12px; margin:10px 0">${v.obs}</p><p style="color:var(--success)">Total: R$ ${v.preco}</p>${fotosHtml}</div>`;

        } else { showAlert("🔍 NÃO LOCALIZADO"); }

    }



    function abrirImg(src) { document.getElementById('modal-view').src = src; document.getElementById('img-modal').style.display = 'flex'; }

    function fecharConfirm() { document.getElementById('confirm-box').style.display = 'none'; }

    function confirmarExcluir(p) { placaParaExcluir = p; document.getElementById('confirm-box').style.display = 'flex'; }

    

    document.getElementById('btn-confirm-sim').onclick = () => {

        db.ref('veiculos/' + placaParaExcluir).remove().then(() => fecharConfirm());

    };



    function prepararEdicao(p) {

        const v = bancoDados[p]; editandoPlaca = p;

        document.getElementById('m-placa').value = p;

        document.getElementById('m-modelo').value = v.modelo;

        document.getElementById('m-preco').value = v.preco;

        document.getElementById('m-obs').value = v.obs;

        document.getElementById('btn-cancelar').classList.remove('hidden');

    }



    function limparFormulario() {

        editandoPlaca = null; fotosBase64 = [];

        ['m-placa','m-modelo','m-preco','m-obs','m-fotos-input'].forEach(id => document.getElementById(id).value = "");

        document.getElementById('preview-area').innerHTML = "";

        document.getElementById('label-upload').innerText = "📸 ENVIAR FOTOS";

        document.getElementById('btn-cancelar').classList.add('hidden');

    }

</script>

</body>

</html>
