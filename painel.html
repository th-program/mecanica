<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg: #000b1a; 
            --primary: #d4af37; 
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: #132a47; 
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d; 
            --input-bg: rgba(0, 30, 61, 0.7); 
            --logo-size: 200px; 
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%); 
            color: var(--text-main); 
            display: block;
            min-height: 100vh; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        .btn-home-fixed {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        @media (min-width: 768px) {
            .btn-home-fixed { position: fixed; top: 20px; left: 20px; margin-bottom: 0; z-index: 1000; }
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto;
        } 
        
        #view-painel { 
            max-width: 1000px !important; 
            width: 100%;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        @media (min-width: 768px) { 
            .container { max-width: 900px; } 
        }

        section { display: block; animation: fadeIn 0.4s ease-out; width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } 
        
        .card { background: none; border: none; padding: 5px; position: relative; width: 100%; } 

        .logo-box { text-align: center; margin-bottom: 25px; padding: 10px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); } 
        
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; } 
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px !important; 
            margin-bottom: 18px; 
            transition: 0.3s; 
        } 
        
        input:focus { border-color: var(--primary); outline: none; background: rgba(0, 30, 61, 0.9); } 
        
        .btn-main { background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); color: #000; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.15); margin-top: 10px; display: block; text-decoration: none; text-align: center; } 

        .categorias-filtro { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 15px; width: 100%; } 
        .cat-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: 0.3s; } 
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.15); } 

        .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; } 
        .status-option { background: rgba(0, 30, 61, 0.5); border: 1px solid var(--border); padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; color: var(--text-dim); transition: 0.3s; } 
        .status-option.active { transform: scale(1.02); border-color: var(--primary); color: #fff; }

        .table-container { margin-top: 20px; background: rgba(255,255,255,0.02); border-radius: 18px; border: 1px solid var(--border); overflow-x: auto; width: 100%; } 
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 13px; } 
        
        .hidden { display: none !important; } 

        .fotos-grid { display: grid; gap: 10px; margin-top: 15px; grid-template-columns: repeat(2, 1fr); } 
        .img-item { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; border: 1px solid var(--border); aspect-ratio: 1/1; } 

        .solicitacao-item { background: rgba(212, 175, 55, 0.05); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 12px; }
        .relatorio-cliente-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border-left: 4px solid var(--primary); margin-bottom: 20px; }

        .painel-grid { display: grid; grid-template-columns: 1fr; gap: 25px; width: 100%; } 
        @media (min-width: 768px) { .painel-grid { grid-template-columns: 1.2fr 0.8fr; } } 
        
        .whatsapp-float-btn { background: #25d366 !important; color: white !important; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; border: none; }

        .tag-servico { font-size: 10px; background: #132a47; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); }

        .btn-upload-custom { display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border: 1px dashed var(--primary); color: var(--primary); padding: 20px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; font-weight: bold; font-size: 13px; transition: 0.3s; width: 100%; }
        
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; font-size: 14px; font-weight: 800; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; text-align: center; }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed"><span>🏠</span> INÍCIO</a>
<div id="custom-alert"></div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <div id="area-login-cliente">
            <h2 style="color:var(--primary); font-size:16px; text-align:center; margin-bottom:20px;">CONSULTAR VEÍCULO</h2>
            <label>Identificação (@)</label>
            <input type="text" id="l-user" placeholder="@seuusuario" style="text-transform: lowercase;">
            <label>Senha</label>
            <input type="password" id="l-pass" placeholder="••••">
            <button class="btn-main" onclick="clienteLogarConsultar()">ACESSAR MEUS VEÍCULOS</button>
        </div>
        
        <div id="resultado-cliente" class="hidden"></div>
        
        <center><button onclick="irPara('view-login')" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text-dim); margin-top:40px; padding: 10px 20px; border-radius: 20px; font-size:11px; font-weight:700; cursor:pointer;">🔒 ACESSO RESTRITO</button></center>
    </section>

    <section id="view-login" class="card hidden">
        <div class="logo-box"><img src="logo.jpg" class="logo-img"></div>
        <label style="text-align: center;">Chave do Painel</label>
        <input type="password" id="pass-admin" placeholder="••••" style="text-align: center; font-size: 28px!important;">
        <button class="btn-main" onclick="logarTecnico()">Entrar no Sistema</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:25px; cursor:pointer;">← Voltar</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h2 style="font-size:16px; color:var(--primary);">PAINEL TÉCNICO</h2>
            <button onclick="location.reload()" style="color:var(--danger); background:rgba(231, 76, 60, 0.1); border:1px solid var(--danger); padding: 8px 15px; border-radius: 10px; font-weight:bold; cursor:pointer;">SAIR</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col">
                <label style="color:var(--success);">📩 Novas Solicitações</label>
                <div id="lista-solicitacoes"></div>
                
                <div class="categorias-filtro">
                    <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                    <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Na Fila</button>
                    <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                </div>

                <div class="table-container">
                    <table id="corpo-tabela"></table>
                </div>
            </div>

            <div class="painel-col">
                <div id="relatorio-cliente-view" class="relatorio-cliente-box" style="display:none">
                    <b style="color:var(--primary)">CLIENTE: <span id="txt-nome-cliente"></span></b><br>
                    <span id="txt-relato-cliente" style="font-size: 13px;"></span>
                </div>

                <label>Placa</label><input type="text" id="m-placa" readonly>
                <label>Modelo</label><input type="text" id="m-modelo" readonly>
                <label>Valor (R$)</label><input type="text" id="m-preco" placeholder="0,00">
                
                <label>Fotos</label>
                <label for="m-fotos-input" class="btn-upload-custom" id="label-upload">📸 ENVIAR FOTOS</label>
                <input type="file" id="m-fotos-input" multiple onchange="previewImages()" style="display:none">
                <div id="preview-area" class="fotos-grid"></div>

                <label>Status</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Oficina</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                </div>

                <label>Relatório Técnico</label>
                <textarea id="m-obs" rows="4" placeholder="O que foi feito?"></textarea>
                
                <button class="btn-main" onclick="salvarServico()">✅ Salvar Registro</button>
            </div>
        </div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let statusSelecionado = "Aguardando";
    let fotosBase64 = [];
    let clienteIdAtual = "";

    function showAlert(msg) {
        const div = document.getElementById('custom-alert');
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 2000);
    }

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- LÓGICA CLIENTE ---
    function clienteLogarConsultar() {
        const user = document.getElementById('l-user').value.trim().toLowerCase().replace('@','');
        const pass = document.getElementById('l-pass').value.trim();

        db.ref('usuarios/' + user).once('value').then(snap => {
            if(snap.exists() && snap.val().senha === pass) {
                buscarVeiculosCliente(user);
            } else {
                showAlert("❌ LOGIN INVÁLIDO");
            }
        });
    }

    function buscarVeiculosCliente(userId) {
        db.ref('servicos_ativos').orderByChild('cliente_id').equalTo(userId).once('value', snap => {
            const veiculos = snap.val();
            const res = document.getElementById('resultado-cliente');
            document.getElementById('area-login-cliente').classList.add('hidden');
            res.classList.remove('hidden');
            
            if(!veiculos) {
                res.innerHTML = "<p style='text-align:center'>Nenhum veículo em manutenção.</p><button class='btn-main' onclick='location.reload()'>VOLTAR</button>";
                return;
            }

            let html = `<h3 style='color:var(--primary); margin-bottom:15px'>Meus Veículos</h3>`;
            Object.values(veiculos).forEach(v => {
                const cor = v.status === "Pronto" ? "var(--success)" : "var(--warning)";
                html += `
                    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; border:1px solid var(--border); margin-bottom:10px">
                        <b>${v.modelo} (${v.placa})</b><br>
                        Status: <span style="color:${cor}">${v.status}</span><br>
                        <p style="font-size:12px; margin-top:5px">${v.obs || 'Aguardando avaliação técnica...'}</p>
                        ${v.preco ? `<b style="color:var(--success)">Valor: R$ ${v.preco}</b>` : ''}
                    </div>`;
            });
            html += `<button class='btn-main' onclick='location.reload()'>SAIR</button>`;
            res.innerHTML = html;
        });
    }

    // --- LÓGICA TÉCNICO ---
    function logarTecnico() {
        if(document.getElementById('pass-admin').value === "1234") {
            irPara('view-painel');
            carregarSolicitacoes();
            carregarTabelaGeral();
        } else { showAlert("❌ SENHA INCORRETA"); }
    }

    function carregarSolicitacoes() {
        db.ref('servicos_ativos').orderByChild('status').equalTo('Aguardando Avaliação').on('value', snap => {
            const lista = document.getElementById('lista-solicitacoes');
            lista.innerHTML = "";
            snap.forEach(item => {
                const s = item.val();
                // Buscar nome do cliente pelo ID
                db.ref('usuarios/' + s.cliente_id).once('value', uSnap => {
                    const nome = uSnap.exists() ? uSnap.val().nome : "Cliente";
                    lista.innerHTML += `
                        <div class="solicitacao-item">
                            <b>${s.placa} - ${s.modelo}</b><br>
                            <span style="font-size:11px">Dono: ${nome}</span><br>
                            <button class="btn-main" style="padding:5px; font-size:10px" onclick="editarServico('${s.placa}')">AVALIAR AGORA</button>
                        </div>`;
                });
            });
        });
    }

    function editarServico(placa) {
        db.ref('servicos_ativos/' + placa).once('value', snap => {
            const s = snap.val();
            document.getElementById('m-placa').value = s.placa;
            document.getElementById('m-modelo').value = s.modelo;
            document.getElementById('m-obs').value = s.problema || "";
            clienteIdAtual = s.cliente_id;
            
            db.ref('usuarios/' + s.cliente_id).once('value', uSnap => {
                document.getElementById('relatorio-cliente-view').style.display = "block";
                document.getElementById('txt-nome-cliente').innerText = uSnap.val().nome;
                document.getElementById('txt-relato-cliente').innerText = s.problema;
            });
        });
    }

    function salvarServico() {
        const placa = document.getElementById('m-placa').value;
        if(!placa) return showAlert("Selecione um serviço");

        db.ref('servicos_ativos/' + placa).update({
            status: statusSelecionado,
            preco: document.getElementById('m-preco').value,
            obs: document.getElementById('m-obs').value,
            fotos: fotosBase64
        }).then(() => {
            showAlert("✔️ ATUALIZADO");
            limparForm();
        });
    }

    function carregarTabelaGeral() {
        db.ref('servicos_ativos').on('value', snap => {
            const corpo = document.getElementById('corpo-tabela');
            corpo.innerHTML = "";
            snap.forEach(item => {
                const v = item.val();
                corpo.innerHTML += `<tr><td><b>${v.placa}</b><br>${v.status}</td><td><button onclick="editarServico('${v.placa}')">✏️</button></td></tr>`;
            });
        });
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                fotosBase64.push(e.target.result);
                document.getElementById('preview-area').innerHTML += `<img src="${e.target.result}" class="img-item">`;
            };
            reader.readAsDataURL(file);
        });
    }

    function setStatus(el) {
        document.querySelectorAll('.status-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        statusSelecionado = el.dataset.status;
    }

    function limparForm() {
        fotosBase64 = [];
        document.getElementById('preview-area').innerHTML = "";
        document.getElementById('relatorio-cliente-view').style.display = "none";
        ['m-placa','m-modelo','m-preco','m-obs'].forEach(id => document.getElementById(id).value = "");
    }
</script>
</body>
</html>
