<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root { 
            --bg-deep: #050a10; 
            --primary-gold: #d4af37; 
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f1d57a 50%, #b8962d 100%);
            --input-bg: rgba(255, 255, 255, 0.05); 
            --border-gold: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-dim: #a0aec0;
            --danger: #ff4d4d;
            --success: #00ff88;
        } 

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; } 

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: linear-gradient(to right, rgba(5, 10, 16, 0.85), rgba(5, 10, 16, 0.98)), url('car.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Botão Início Fixo */
        .btn-home-fixed {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--primary-gold);
            color: var(--primary-gold); padding: 8px 15px; border-radius: 8px;
            text-decoration: none; font-size: 11px; font-weight: bold;
            text-transform: uppercase; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-home-fixed:hover { background: var(--primary-gold); color: #000; }

        .main-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        /* Layout de Login (Horizontal em PC) */
        .login-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
            width: 100%;
        }

        @media (max-width: 992px) {
            .login-layout { grid-template-columns: 1fr; text-align: center; }
            .side-features { order: 3; margin-top: 30px; display: grid !important; grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .side-info { display: none; }
        }

        /* Card Estilo Glass */
        .card-glass {
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-gold);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            width: 100%;
        }

        .logo-box { margin-bottom: 30px; text-align: center; }
        .logo-img { width: 220px; filter: drop-shadow(0 0 12px rgba(212,175,55,0.3)); }

        /* Inputs e Formulários */
        .input-group { margin-bottom: 20px; position: relative; text-align: left; }
        label { display: block; font-size: 11px; color: var(--primary-gold); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        
        input, textarea, select { 
            width: 100%; padding: 15px; background: var(--input-bg); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #fff; font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-gold); outline: none; background: rgba(255,255,255,0.08); }

        .input-placa-grande { 
            font-family: 'Monaco', monospace; font-size: 28px !important; 
            background: #fff !important; color: #000 !important; 
            text-align: center; letter-spacing: 4px; font-weight: bold;
            border: 3px solid var(--primary-gold) !important;
        }

        /* Botões */
        .btn-main { 
            background: var(--gold-gradient); color: #000; width: 100%; padding: 18px; 
            border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; font-size: 14px; margin-top: 10px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); }

        /* Painel Técnico (Horizontal em PC) */
        #view-painel { width: 100%; }
        .painel-grid { 
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 30px; 
            width: 100%;
        }

        @media (max-width: 850px) {
            .painel-grid { grid-template-columns: 1fr; }
        }

        /* Side Features (Seguro, Rápido, Eficiente) */
        .side-features { display: flex; flex-direction: column; gap: 30px; }
        .feature-item { display: flex; align-items: center; gap: 15px; text-align: left; }
        .feature-icon { 
            width: 45px; height: 45px; border: 1px solid var(--primary-gold); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: var(--primary-gold); font-size: 20px; background: rgba(212,175,55,0.1);
        }
        .feature-text b { color: var(--primary-gold); font-size: 12px; text-transform: uppercase; display: block; }
        .feature-text p { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

        /* Filtros e Tabelas */
        .categorias-filtro { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { 
            background: var(--input-bg); border: 1px solid var(--border-gold); 
            color: var(--text-dim); padding: 10px 15px; border-radius: 8px; 
            font-size: 10px; font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        .cat-btn.active { background: var(--primary-gold); color: #000; }

        .table-container { 
            background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid var(--border-gold);
            overflow: hidden; margin-top: 15px;
        }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid rgba(212,175,55,0.1); font-size: 13px; }

        /* Status Picker */
        .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .status-option { 
            background: #111; border: 1px solid #333; padding: 12px 5px; 
            border-radius: 10px; text-align: center; cursor: pointer; 
            font-size: 10px; font-weight: bold; color: var(--text-dim);
        }
        .status-option.active { border-color: var(--primary-gold); color: var(--primary-gold); background: rgba(212,175,55,0.1); }

        /* Modal e Fotos */
        .fotos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; }
        .img-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-gold); cursor: pointer; }
        
        #img-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; }
        #modal-view { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--primary-gold); }

        .hidden { display: none !important; }
        .footer-secure { text-align: center; margin-top: 40px; font-size: 11px; color: var(--text-dim); opacity: 0.6; width: 100%; }
        
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white; display: none; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .solicitacao-item { background: rgba(212, 175, 55, 0.08); border: 1px solid var(--border-gold); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home-fixed" onclick="location.reload()">INÍCIO</a>

    <div id="custom-alert"></div>
    <div id="img-modal" onclick="this.style.display='none'"><img id="modal-view" src=""></div>

    <div class="main-wrapper">
        
        <section id="view-cliente" class="login-layout">
            <div class="side-info">
                </div>

            <div class="card-glass">
                <div class="logo-box">
                    <img src="logo.jpg" class="logo-img" alt="Lima Car Logo">
                    <p style="font-size: 9px; letter-spacing: 3px; color: var(--primary-gold); margin-top: 10px; font-weight: bold;">PREMIUM AUTO SERVICE</p>
                </div>

                <div id="area-busca">
                    <div class="input-group">
                        <label>Identificação (@)</label>
                        <input type="text" id="login-user" placeholder="@seuusuario" oninput="verificarUsuarioMecanico(this.value)">
                    </div>

                    <div class="input-group">
                        <label>Senha de Acesso</label>
                        <input type="password" id="login-pass" placeholder="••••">
                    </div>

                    <div id="wrapper-placa" class="hidden">
                        <div class="input-group">
                            <label>Placa do Veículo</label>
                            <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1D23">
                        </div>
                    </div>

                    <button class="btn-main" id="btn-localizar" onclick="gerenciarLogin()">
                        ACESSAR SISTEMA <span>›</span>
                    </button>
                </div>

                <div id="resultado-cliente"></div>
            </div>

            <div class="side-features">
                <div class="feature-item">
                    <div class="feature-icon">🏅</div>
                    <div class="feature-text">
                        <b>Seguro</b>
                        <p>Proteção total dos dados<br>e do seu veículo.</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🚀</div>
                    <div class="feature-text">
                        <b>Rápido</b>
                        <p>Acompanhamento em tempo<br>real da manutenção.</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💎</div>
                    <div class="feature-text">
                        <b>Eficiente</b>
                        <p>Relatórios detalhados e<br>transparência total.</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-painel" class="card-glass hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 15px;">
                <h2 style="font-size:14px; color:var(--primary-gold); letter-spacing: 2px;">GESTÃO TÉCNICA</h2>
                <button onclick="location.reload()" style="color:var(--danger); background:rgba(255,0,0,0.1); border:1px solid var(--danger); padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor:pointer;">SAIR</button>
            </div>

            <div class="painel-grid">
                <div class="painel-col">
                    <div id="aba-novos-cadastros">
                        <label style="color:var(--success); margin-bottom: 10px; display: flex; align-items: center; gap: 5px;">
                            <span>📩</span> Novas Solicitações
                        </label>
                        <div id="lista-solicitacoes"></div>
                    </div>
                    
                    <div style="margin-top: 25px; display: flex; justify-content: space-between; align-items: center;">
                        <div class="categorias-filtro">
                            <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">Todos</button>
                            <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">Fila</button>
                            <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">Oficina</button>
                            <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">Prontos</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="corpo-tabela"></table>
                    </div>
                </div>

                <div class="painel-col" style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);">
                    <label>Dados do Veículo</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="text" id="m-placa" placeholder="PLACA" maxlength="7" readonly style="opacity: 0.7;">
                        <input type="text" id="m-preco" placeholder="VALOR R$" oninput="mascaraMoeda(this)">
                    </div>
                    <input type="text" id="m-modelo" placeholder="MODELO / ANO" readonly style="opacity: 0.7; margin-top: 10px;">
                    
                    <input type="hidden" id="m-identificacao-interna">

                    <label style="margin-top: 15px;">Mídia do Serviço</label>
                    <label for="m-fotos-input" style="background: rgba(212,175,55,0.1); border: 1px dashed var(--primary-gold); color: var(--primary-gold); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 11px;" id="label-upload">
                        📸 ADICIONAR FOTOS
                    </label>
                    <input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()" style="display: none;">
                    <div id="preview-area" class="fotos-grid"></div>

                    <label style="margin-top: 15px;">Progresso</label>
                    <div class="status-picker">
                        <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Fila</div>
                        <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Oficina</div>
                        <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                    </div>

                    <label>Relatório Técnico</label>
                    <textarea id="m-obs" rows="4" placeholder="Descrição do serviço..."></textarea>
                    
                    <button class="btn-main" onclick="salvar()">✅ SALVAR ALTERAÇÕES</button>
                    <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#222; color:#fff; margin-top:10px; font-size: 11px;">DESCARTAR</button>
                </div>
            </div>
        </section>

        <p class="footer-secure">SISTEMA LIMA CAR • SEGURANÇA CRIPTOGRAFADA • 2026</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "a-fonte-43744.firebaseapp.com",
            databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
            projectId: "a-fonte-43744",
            storageBucket: "a-fonte-43744.appspot.com",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const LOGIN_ADM = "adm.limacar";
        const SENHA_ADM = "1234";
        
        let statusSelecionado = "Aguardando";
        let bancoDados = {}; 
        let bancoSolicitacoes = {};
        let fotosBase64 = [];
        let whatsappAtual = "";
        let nomeClienteAtual = "";
        let relatoClienteAtual = "";

        function verificarUsuarioMecanico(valor) {
            const wrapperPlaca = document.getElementById('wrapper-placa');
            const loginLimpo = valor.trim().toLowerCase().replace('@','');
            if (LOGIN_ADM.startsWith(loginLimpo) || loginLimpo === "") {
                wrapperPlaca.classList.add('hidden');
            } else {
                wrapperPlaca.classList.remove('hidden');
            }
        }

        function gerenciarLogin() {
            const userDigitado = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
            const senhaDigitada = document.getElementById('login-pass').value.trim();
            if(userDigitado === LOGIN_ADM) {
                if(senhaDigitada === SENHA_ADM) { 
                    irPara('view-painel'); 
                } else { 
                    showAlert("❌ SENHA INCORRETA"); 
                }
                return;
            }
            consultarCarro();
        }

        function consultarCarro() {
            const user = document.getElementById('login-user').value.trim().toLowerCase().replace('@','');
            const pass = document.getElementById('login-pass').value.trim();
            const placa = document.getElementById('login-placa').value.trim().toUpperCase();
            const res = document.getElementById('resultado-cliente');

            if(!user || !pass || !placa) return showAlert("PREENCHA TUDO");

            db.ref('usuarios/' + user).once('value', (snapUser) => {
                if(snapUser.exists() && snapUser.val().senha === pass) {
                    db.ref('veiculos/' + placa).once('value', (snapVeiculo) => {
                        const v = snapVeiculo.val();
                        if(v && v.identificacao === user) {
                            res.innerHTML = `
                                <div style="background:rgba(212,175,55,0.1); border:1px solid var(--primary-gold); padding:20px; border-radius:15px; margin-top:20px;">
                                    <h3 style="color:var(--primary-gold)">${v.modelo}</h3>
                                    <p style="font-size:14px; margin:10px 0;">Status: <b>${v.status}</b></p>
                                    <p style="font-size:12px; color:var(--text-dim)">${v.obs}</p>
                                    <div class="fotos-grid">${(v.fotos || []).map(f => `<img src="${f}" class="img-item" onclick="abrirImg('${f}')">`).join('')}</div>
                                    <hr style="margin:15px 0; border:0; border-top:1px solid rgba(212,175,55,0.2)">
                                    <p style="text-align:right; font-weight:bold; color:var(--primary-gold)">Total: R$ ${v.preco}</p>
                                </div>`;
                            document.getElementById('area-busca').classList.add('hidden');
                        } else { showAlert("VEÍCULO NÃO ENCONTRADO"); }
                    });
                } else { showAlert("LOGIN INVÁLIDO"); }
            });
        }

        db.ref('veiculos').on('value', (snapshot) => {
            bancoDados = snapshot.val() || {};
            desenharTabela();
        });

        db.ref('servicos_ativos').on('value', (snapshot) => {
            bancoSolicitacoes = snapshot.val() || {};
            desenharSolicitacoes();
        });

        function desenharSolicitacoes() {
            const container = document.getElementById('lista-solicitacoes');
            container.innerHTML = "";
            Object.keys(bancoSolicitacoes).forEach(id => {
                const s = bancoSolicitacoes[id];
                container.innerHTML += `
                    <div class="solicitacao-item">
                        <b style="color:var(--primary-gold); font-size:13px">${s.placa}</b><br>
                        <span style="font-size:11px;">${s.modelo} - ${s.nome_cliente}</span><br>
                        <button class="cat-btn" style="margin-top:8px; width:100%" onclick="importarSolicitacao('${id}')">EDITAR</button>
                    </div>`;
            });
        }

        function importarSolicitacao(id) {
            const s = bancoSolicitacoes[id];
            document.getElementById('m-placa').value = s.placa;
            document.getElementById('m-modelo').value = s.modelo;
            document.getElementById('m-identificacao-interna').value = s.cliente_id || "";
            whatsappAtual = s.zap_cliente || "";
            nomeClienteAtual = s.nome_cliente || "";
            relatoClienteAtual = s.problema || "";
            showAlert("DADOS CARREGADOS");
        }

        function salvar() {
            const placa = document.getElementById('m-placa').value.toUpperCase().trim();
            if(!placa) return showAlert("SELECIONE UM VEÍCULO");
            
            const dados = {
                modelo: document.getElementById('m-modelo').value,
                preco: document.getElementById('m-preco').value,
                obs: document.getElementById('m-obs').value,
                status: statusSelecionado,
                fotos: fotosBase64,
                clienteZap: whatsappAtual,
                clienteNome: nomeClienteAtual,
                identificacao: document.getElementById('m-identificacao-interna').value
            };

            db.ref('veiculos/' + placa).set(dados).then(() => {
                db.ref('servicos_ativos/' + placa).remove();
                showAlert("✅ SALVO COM SUCESSO");
                limparFormulario();
            });
        }

        function desenharTabela(filtro = "Todos") {
            const corpo = document.getElementById('corpo-tabela');
            corpo.innerHTML = "";
            Object.keys(bancoDados).forEach(p => {
                const v = bancoDados[p];
                if(filtro !== "Todos" && v.status !== filtro) return;
                corpo.innerHTML += `
                    <tr>
                        <td><b style="color:var(--primary-gold)">${p}</b><br><small>${v.status}</small></td>
                        <td style="text-align:right">
                            <button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer;">✏️</button>
                        </td>
                    </tr>`;
            });
        }

        function prepararEdicao(p) {
            const v = bancoDados[p];
            document.getElementById('m-placa').value = p;
            document.getElementById('m-modelo').value = v.modelo;
            document.getElementById('m-preco').value = v.preco;
            document.getElementById('m-obs').value = v.obs;
            document.getElementById('m-identificacao-interna').value = v.identificacao || "";
            fotosBase64 = v.fotos || [];
            renderizarFotosEdicao();
            document.getElementById('btn-cancelar').classList.remove('hidden');
        }

        function renderizarFotosEdicao() {
            const area = document.getElementById('preview-area');
            area.innerHTML = "";
            fotosBase64.forEach((src, idx) => {
                area.innerHTML += `<img src="${src}" class="img-item" onclick="removerFoto(${idx})">`;
            });
            document.getElementById('label-upload').innerText = fotosBase64.length + " FOTOS CARREGADAS";
        }

        function removerFoto(idx) { fotosBase64.splice(idx,1); renderizarFotosEdicao(); }

        function previewImages() {
            const files = document.getElementById('m-fotos-input').files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => { fotosBase64.push(e.target.result); renderizarFotosEdicao(); };
                reader.readAsDataURL(file);
            });
        }

        function limparFormulario() {
            ['m-placa','m-modelo','m-preco','m-obs','m-identificacao-interna'].forEach(id => document.getElementById(id).value = "");
            fotosBase64 = [];
            renderizarFotosEdicao();
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        function irPara(id) { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        function showAlert(msg) { 
            const div = document.getElementById('custom-alert'); 
            div.innerText = msg; div.style.display = 'block'; 
            setTimeout(() => { div.style.display = 'none'; }, 2500); 
        }

        function mascaraMoeda(i) { 
            let v = i.value.replace(/\D/g,''); 
            v = (v/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
            i.value = v; 
        }

        function setStatus(el) { 
            document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active')); 
            el.classList.add('active'); 
            statusSelecionado = el.getAttribute('data-status'); 
        }

        function filtrarTabela(f, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            desenharTabela(f);
        }

        function abrirImg(src) { 
            document.getElementById('modal-view').src = src; 
            document.getElementById('img-modal').style.display = 'flex'; 
        }
    </script>
</body>
</html>
