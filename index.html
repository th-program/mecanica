<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mecânica High-Tech | Master</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --card-bg: #161618;
            --primary: #ff6b00;
            --primary-glow: rgba(255, 107, 0, 0.2);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2d2d2d;
            --carbon: #212124; 
            --success: #00e676;
            --warning: #ffd600;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            /* Padding maior para evitar que o card corte no topo/base no mobile */
            padding: 40px 15px; 
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 1.3rem;
        }

        /* Ajuste para iOS não dar zoom: Fonte mínima 16px */
        input, textarea {
            width: 100%;
            padding: 16px;
            background: #1e1e21;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff;
            font-size: 16px !important; 
            margin-bottom: 15px;
        }

        /* SELETOR DE STATUS BONITÃO */
        .status-picker {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .status-option {
            background: #222;
            border: 1px solid var(--border);
            padding: 12px 5px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .status-option.active[data-status="Aguardando"] { background: #333; border-color: var(--text-dim); color: #fff; }
        .status-option.active[data-status="Trabalhando"] { background: rgba(255, 214, 0, 0.2); border-color: var(--warning); color: var(--warning); }
        .status-option.active[data-status="Pronto"] { background: rgba(0, 230, 118, 0.2); border-color: var(--success); color: var(--success); }

        .btn-main { 
            background: var(--primary); 
            color: #fff; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        /* MENSAGEM DE SUCESSO */
        #msg-sucesso {
            display: none;
            background: var(--success);
            color: #000;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            margin-bottom: 20px;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* GRID PARA PC */
        @media (min-width: 768px) {
            .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .full-width { grid-column: span 2; }
            .status-picker { grid-column: span 2; }
        }

        .table-container { overflow-x: auto; margin-top: 25px; border-top: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <section id="view-cliente" class="card">
        <h2>CONSULTA RÁPIDA</h2>
        <input type="text" id="login-placa" placeholder="PLACA (EX: ABC1234)" maxlength="7" style="text-transform: uppercase; text-align: center; font-weight: 900; font-size: 1.5rem !important;">
        <button class="btn-main" onclick="consultarCarro()">Localizar Veículo</button>
        <div id="resultado-cliente" class="hidden"></div>
        <center><button onclick="irPara('view-login')" style="background:none; border:none; color:#444; margin-top:20px; font-size:10px; cursor:pointer">ADMINISTRAÇÃO</button></center>
    </section>

    <section id="view-login" class="card hidden">
        <h2>ACESSO RESTRITO</h2>
        <input type="password" id="pass-admin" placeholder="SENHA" style="text-align:center">
        <button class="btn-main" onclick="logar()">Entrar</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer">Voltar</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <div id="msg-sucesso">✅ VEÍCULO ATUALIZADO COM SUCESSO!</div>
        <h2>GESTÃO DE PÁTIO</h2>
        
        <div class="form-grid">
            <div>
                <label style="font-size:10px; color:var(--text-dim)">PLACA</label>
                <input type="text" id="m-placa" maxlength="7" style="text-transform:uppercase">
            </div>
            <div>
                <label style="font-size:10px; color:var(--text-dim)">MODELO</label>
                <input type="text" id="m-modelo" placeholder="Ex: Corolla Preto">
            </div>
        </div>

        <label style="font-size:10px; color:var(--text-dim)">SELECIONE O STATUS</label>
        <div class="status-picker" id="status-group">
            <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
            <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Trabalhando</div>
            <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Pronto</div>
        </div>

        <div class="full-width">
            <label style="font-size:10px; color:var(--text-dim)">FOTO</label>
            <input type="file" id="m-foto" accept="image/*" onchange="processarFoto()">
        </div>

        <textarea id="m-obs" rows="3" placeholder="Relatório técnico..."></textarea>
        
        <button class="btn-main" onclick="salvar()">Salvar no Sistema</button>

        <div class="table-container">
            <table id="corpo-tabela"></table>
        </div>
        
        <center><button onclick="location.reload()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer">Sair do Painel</button></center>
    </section>
</div>

<script>
    const CHAVE = "1234";
    let fotoBase64 = "";
    let statusSelecionado = "Aguardando";

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-painel') desenharTabela();
        window.scrollTo(0,0);
    }

    function logar() {
        if(document.getElementById('pass-admin').value === CHAVE) irPara('view-painel');
        else alert("Senha Incorreta");
    }

    function setStatus(el) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        statusSelecionado = el.getAttribute('data-status');
    }

    function processarFoto() {
        const file = document.getElementById('m-foto').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { fotoBase64 = reader.result; };
        if(file) reader.readAsDataURL(file);
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('m-modelo').value.trim();
        const obs = document.getElementById('m-obs').value;
        if(!placa || !modelo) return alert("Preencha Placa e Modelo");

        let db = JSON.parse(localStorage.getItem('oficina_v11')) || {};
        db[placa] = { modelo, status: statusSelecionado, obs, foto: fotoBase64, data: new Date().toLocaleString('pt-BR') };
        localStorage.setItem('oficina_v11', JSON.stringify(db));

        // Feedback de Sucesso
        const msg = document.getElementById('msg-sucesso');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 3000);

        desenharTabela();
        // Limpar campos
        document.getElementById('m-placa').value = "";
        document.getElementById('m-modelo').value = "";
        document.getElementById('m-obs').value = "";
    }

    function desenharTabela() {
        const db = JSON.parse(localStorage.getItem('oficina_v11')) || {};
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(db).reverse().forEach(p => {
            corpo.innerHTML += `<tr><td><b>${p}</b><br>${db[p].modelo}</td><td style="text-align:right">${db[p].status}</td></tr>`;
        });
    }

    function consultarCarro() {
        const placa = document.getElementById('login-placa').value.toUpperCase().trim();
        const db = JSON.parse(localStorage.getItem('oficina_v11')) || {};
        const res = document.getElementById('resultado-cliente');
        
        if(db[placa]) {
            const p = db[placa];
            const cor = p.status === "Pronto" ? "#00e676" : (p.status === "Trabalhando" ? "#ffd600" : "#a0a0a0");
            res.innerHTML = `
                <div style="background:#111; border-radius:15px; padding:20px; margin-top:20px; border:1px solid #333">
                    <h3 style="color:var(--primary); margin:0 0 10px 0">${p.modelo}</h3>
                    <div style="display:inline-block; padding:5px 15px; border-radius:20px; background:${cor}; color:#000; font-weight:bold; font-size:12px; margin-bottom:15px">${p.status.toUpperCase()}</div>
                    ${p.foto ? `<img src="${p.foto}" style="width:100%; border-radius:10px; margin-bottom:15px">` : ''}
                    <p style="color:#eee; font-size:14px; line-height:1.5">${p.obs}</p>
                    <hr style="border:0; border-top:1px solid #222">
                    <small style="color:#555">Última atualização: ${p.data}</small>
                </div>
            `;
            res.classList.remove('hidden');
        } else { alert("Placa não encontrada."); }
    }
</script>
</body>
</html>
