<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=PrestigeEliteStd&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f9f9f9, #e4e4e4);
            margin: 0;
            padding: 0;
            color: #333;
            transition: background 0.3s ease;
        }
        h1, h2, h3 {
            font-family: 'PrestigeEliteStd', serif;
            color: #2c3e50;
            text-align: center;
            margin: 20px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .luxury-card {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            padding: 20px;
            margin: 20px;
            backdrop-filter: blur(10px);
        }
        .luxury-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }
        .button {
            background: linear-gradient(135deg, #6c5ce7, #f0f341);
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: background 0.3s, transform 0.3s;
        }
        .button:hover {
            background: #f0f341;
            transform: scale(1.05);
        }
        /* Media query for responsiveness */
        @media (max-width: 600px) {
            .luxury-card {
                margin: 10px;
                padding: 10px;
            }
        }
    </style>
    <title>Luxury Design</title>
</head>
<body>
    <h1>Elevated Design</h1>
    <div class="luxury-card">
        <h2>Welcome to Our Premium Experience</h2>
        <p>This section unveils a luxurious approach to our content, elevating the aesthetic to a high-end level.</p>
        <button class="button">Get Started</button>
    </div>
</body>
</html>
