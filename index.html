<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 1. COLE AQUI AS SUAS CONFIGURAÇÕES QUE VOCÊ COPIOU DO FIREBASE
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    databaseURL: "https://SEU_PROJETO.firebaseio.com",
    projectId: "SEU_PROJETO",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SEU_ID",
    appId: "SEU_APP_ID"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'servicos');

  // 2. FUNÇÃO DO MECÂNICO: Salvar no Banco de Dados Real
  window.adicionarServico = function() {
    const carro = document.getElementById('carro-nome').value;
    const placa = document.getElementById('placa').value;
    const servico = document.getElementById('servico').value;

    if(carro && placa && servico) {
        push(dbRef, {
            carro: carro,
            placa: placa,
            servico: servico,
            data: new Date().toLocaleDateString()
        });
        alert("Salvo no banco de dados com sucesso!");
        document.getElementById('carro-nome').value = '';
        document.getElementById('servico').value = '';
    }
  }

  // 3. FUNÇÃO DO CLIENTE: Ler do Banco de Dados em Tempo Real
  window.renderizarTabela = function() {
    onValue(dbRef, (snapshot) => {
        const tbody = document.querySelector('#tabela-cliente tbody');
        tbody.innerHTML = '';
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            tbody.innerHTML += `
                <tr>
                    <td>${data.carro}</td>
                    <td>${data.placa}</td>
                    <td>${data.servico} (${data.data})</td>
                </tr>`;
        });
    });
  }
</script>
