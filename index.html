<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mecânica High-Tech | Master</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --card-bg: #161618;
            --primary: #ff6b00;
            --primary-glow: rgba(255, 107, 0, 0.2);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2d2d2d;
            --carbon: #212124; 
            --success: #00e676;
            --warning: #ffd600;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 20px; /* Aumentado para garantir respiro nas bordas */
        }

        .container {
            width: 100%;
            max-width: 900px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 100%; /* Garante que não estoure no mobile */
            position: relative;
            margin: auto;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 1.3rem;
        }

        .form-row { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%;
        }

        @media (min-width: 768px) {
            .form-row { flex-direction: row; }
            .card { padding: 40px; }
        }

        .input-group { 
            flex: 1; 
            width: 100%; 
            margin-bottom: 15px; 
        }
        
        label { display: block; color: var(--text-dim); margin-bottom: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: #1e1e21;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            display: block;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .car-display {
            background: #111112;
            border-radius: 18px;
            overflow: hidden;
            margin-top: 25px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .model-header {
            background: var(--carbon);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .model-header h3 { margin: 0; font-size: 1.4rem; color: var(--primary); text-transform: uppercase; font-weight: 900; }

        @media (min-width: 768px) {
            .car-display { flex-direction: row; }
            .car-img-box { width: 40%; border-right: 1px solid var(--border); }
            .car-info-content { width: 60%; padding: 30px; }
        }

        .car-img-box img { width: 100%; height: 100%; object-fit: cover; min-height: 200px; }
        .car-info-content { padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .status-pill {
            display: inline-flex;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .report-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            text-align: left;
        }

        .btn-main { 
            background: var(--primary); 
            color: #fff; 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
            margin-top: 10px;
        }

        .table-container { overflow-x: auto; margin-top: 25px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; padding: 12px; color: var(--primary); border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #222; }

        .hidden { display: none; }

        @media (max-width: 767px) {
            .card { border-radius: 20px; }
            input#login-placa { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <section id="view-cliente" class="card">
        <h2>CONSULTA RÁPIDA</h2>
        <div class="input-group">
            <label>Placa do Veículo</label>
            <input type="text" id="login-placa" placeholder="ABC1234" maxlength="7" style="text-transform: uppercase; text-align: center; font-weight: 900;">
        </div>
        <button class="btn-main" onclick="consultarCarro()">Buscar</button>
        <div id="resultado-cliente" class="hidden"></div>
        <button onclick="irPara('view-login')" style="background:transparent; border:none; color:#333; width:100%; margin-top:20px; cursor:pointer; font-size: 10px; text-transform:uppercase;">Painel Técnico</button>
    </section>

    <section id="view-login" class="card hidden">
        <h2>ACESSO RESTRITO</h2>
        <input type="password" id="pass-admin" placeholder="SENHA" style="text-align:center">
        <button class="btn-main" style="margin-top:15px" onclick="logar()">Entrar</button>
        <button onclick="irPara('view-cliente')" style="background:transparent; border:none; color:#444; width:100%; margin-top:10px; cursor:pointer;">Voltar</button>
    </section>

    <section id="view-painel" class="card hidden">
        <h2>CADASTRO PÁTIO</h2>
        
        <div class="form-row">
            <div class="input-group">
                <label>Placa</label>
                <input type="text" id="m-placa" maxlength="7" style="text-transform:uppercase">
            </div>
            <div class="input-group">
                <label>Modelo / Veículo</label>
                <input type="text" id="m-modelo" placeholder="Ex: Mobi">
            </div>
        </div>

        <div class="form-row">
            <div class="input-group">
                <label>Foto do Veículo</label>
                <input type="file" id="m-foto" accept="image/*" onchange="processarFoto()">
            </div>
            <div class="input-group">
                <label>Status</label>
                <select id="m-status">
                    <option value="Aguardando">AGUARDANDO</option>
                    <option value="Trabalhando">EM MANUTENÇÃO</option>
                    <option value="Pronto">PRONTO</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Relatório do Serviço</label>
            <textarea id="m-obs" rows="3"></textarea>
        </div>

        <button class="btn-main" onclick="salvar()">Salvar</button>

        <div class="table-container">
            <table>
                <thead><tr><th>VEÍCULO</th><th>STATUS</th><th>#</th></tr></thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="background:transparent; border:none; color:#444; width:100%; margin-top:15px; cursor:pointer; font-size: 11px;">Sair</button>
    </section>
</div>

<script>
    const CHAVE = "1234";
    let fotoBase64 = "";

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-painel') desenharTabela();
    }

    function logar() {
        if(document.getElementById('pass-admin').value === CHAVE) irPara('view-painel');
        else alert("Senha Incorreta!");
    }

    function processarFoto() {
        const file = document.getElementById('m-foto').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { fotoBase64 = reader.result; };
        if(file) reader.readAsDataURL(file);
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('m-modelo').value.trim();
        const status = document.getElementById('m-status').value;
        const obs = document.getElementById('m-obs').value;
        if(!placa || !modelo) return alert("Preencha os campos!");

        let db = JSON.parse(localStorage.getItem('mecanica_v11')) || {};
        db[placa] = { modelo, status, obs, foto: fotoBase64, data: new Date().toLocaleString('pt-BR') };
        localStorage.setItem('mecanica_v11', JSON.stringify(db));
        alert("Salvo!");
        fotoBase64 = "";
        desenharTabela();
    }

    function desenharTabela() {
        const db = JSON.parse(localStorage.getItem('mecanica_v11')) || {};
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(db).reverse().forEach(p => {
            corpo.innerHTML += `<tr><td><b>${p}</b><br>${db[p].modelo}</td><td>${db[p].status}</td><td><button onclick="deletar('${p}')" style="background:none; border:none; color:red;">✕</button></td></tr>`;
        });
    }

    function deletar(p) {
        if(confirm("Excluir " + p + "?")) {
            let db = JSON.parse(localStorage.getItem('mecanica_v11'));
            delete db[p];
            localStorage.setItem('mecanica_v11', JSON.stringify(db));
            desenharTabela();
        }
    }

    function consultarCarro() {
        const placa = document.getElementById('login-placa').value.toUpperCase().trim();
        const db = JSON.parse(localStorage.getItem('mecanica_v11')) || {};
        const res = document.getElementById('resultado-cliente');
        
        if(db[placa]) {
            const p = db[placa];
            const cor = p.status === "Pronto" ? "var(--success)" : (p.status === "Trabalhando" ? "var(--warning)" : "var(--text-dim)");
            res.innerHTML = `
                <div class="car-display">
                    <div class="model-header"><h3>${p.modelo}</h3></div>
                    ${p.foto ? `<div class="car-img-box"><img src="${p.foto}"></div>` : ''}
                    <div class="car-info-content">
                        <span class="status-pill" style="background:${cor}; color:#000;">${p.status}</span>
                        <div class="report-box">
                            <b style="color:var(--primary); font-size:0.6rem; display:block; margin-bottom:5px">RELATÓRIO:</b>
                            <p style="margin:0; font-size:1rem">${p.obs}</p>
                        </div>
                        <small style="margin-top:15px; color:#444; font-size:9px">PLACA: ${placa} | ${p.data}</small>
                    </div>
                </div>
            `;
            res.classList.remove('hidden');
        } else { alert("Não encontrado."); }
    }
</script>
</body>
</html>
