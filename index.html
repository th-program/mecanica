<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mecânica Lima Car | Sistema Pro</title>
    <style>
        :root {
            --bg: #001233; /* Azul Marinho Profundo */
            --card-bg: #001e50; /* Azul Marinho Cartão */
            --primary: #FFD700; /* Dourado da Logo para contrastes e botões */
            --text-main: #ffffff;
            --text-dim: #b0c4de;
            --border: #1a3a6d;
            --success: #00e676;
            --warning: #ffea00;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 550px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
        }

        /* Logo Estilizada */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-img {
            width: 220px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        h2 {
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        label {
            display: block;
            font-size: 10px;
            color: var(--primary);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #002a70;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px !important;
            margin-bottom: 15px;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .input-placa-grande {
            font-size: 26px !important;
            font-weight: 900;
            text-align: center;
            letter-spacing: 4px;
            color: var(--primary);
        }

        .status-picker {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .status-option {
            background: #002a70;
            border: 1px solid var(--border);
            padding: 10px 2px;
            border-radius: 10px;
            text-align: center;
            font-size: 9px;
            font-weight: 800;
            cursor: pointer;
            color: var(--text-dim);
        }
        .status-option.active { border-color: var(--primary); color: var(--primary); background: rgba(255, 215, 0, 0.1); }

        .btn-main {
            background: var(--primary);
            color: #001233;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-main:hover { opacity: 0.9; }

        .btn-whats {
            background: #25D366;
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .foto-preview-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .foto-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .cat-btn {
            padding: 8px 12px;
            border-radius: 10px;
            background: #002a70;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 10px;
            cursor: pointer;
            margin-right: 5px;
        }
        .cat-btn.active { background: var(--primary); color: #001233; }

        .table-container { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid var(--border); font-size: 12px; }

        .hidden { display: none; }
        
        #modal-imagem {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div id="modal-imagem" onclick="this.style.display='none'">
    <img src="" id="img-ampliada" style="max-width: 90%; max-height: 80%; border-radius: 8px;">
</div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-container">
            <img src="https://i.imgur.com/vHq0A6v.jpeg" alt="Mecânica Lima Car" class="logo-img">
        </div>
        <h2>Acompanhe seu Veículo</h2>
        <label>Informe sua Placa</label>
        <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1234" oninput="this.value = this.value.toUpperCase()">
        <button class="btn-main" onclick="consultarCarro()">Localizar Agora</button>
        <div id="resultado-cliente"></div>
        <center>
            <button onclick="irPara('view-login')" style="background:none; border:none; color:var(--text-dim); margin-top:30px; font-size:9px; cursor:pointer; font-weight:700;">ÁREA RESTRITA - LIMA CAR</button>
        </center>
    </section>

    <section id="view-login" class="card hidden">
        <h2>Acesso Técnico</h2>
        <input type="password" id="pass-admin" placeholder="Senha" style="text-align:center">
        <button class="btn-main" onclick="logar()">Entrar</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer">Voltar</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <div class="logo-container">
            <img src="https://i.imgur.com/vHq0A6v.jpeg" alt="Mecânica Lima Car" class="logo-img" style="width: 140px;">
        </div>
        <h2 id="titulo-painel">Gestão de Pátio</h2>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div>
                <label>Placa</label>
                <input type="text" id="m-placa" maxlength="7" oninput="this.value = this.value.toUpperCase()">
            </div>
            <div>
                <label>Valor (R$)</label>
                <input type="text" id="m-preco" oninput="mascaraMoeda(this)">
            </div>
        </div>

        <label>Modelo do Carro</label>
        <input type="text" id="m-modelo" oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1)">

        <label>Status</label>
        <div class="status-picker">
            <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
            <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Em Serviço</div>
            <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Finalizado</div>
        </div>

        <label>Fotos</label>
        <button onclick="document.getElementById('m-foto').click()" style="background:#002a70; color:white; border:1px solid var(--border); padding:10px; width:100%; border-radius:10px; margin-bottom:10px; cursor:pointer">📸 Adicionar Fotos</button>
        <input type="file" id="m-foto" hidden multiple accept="image/*" onchange="processarFotos(this)">
        <div id="preview-fotos" class="foto-preview-container"></div>

        <label>Relatório Técnico</label>
        <textarea id="m-obs" rows="3" onblur="corrigirIA(this)"></textarea>
        
        <button class="btn-main" id="btn-salvar" onclick="salvar()">Salvar Veículo</button>
        <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#444; color:white; margin-top:10px">Cancelar Edição</button>

        <div class="table-container">
            <div style="display:flex; overflow-x:auto; padding-bottom:10px; margin-top:20px">
                <div class="cat-btn active" onclick="filtrarTabela('Todos', this)">Todos</div>
                <div class="cat-btn" onclick="filtrarTabela('Aguardando', this)">Aguardando</div>
                <div class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">Serviço</div>
                <div class="cat-btn" onclick="filtrarTabela('Pronto', this)">Prontos</div>
            </div>
            <table id="corpo-tabela"></table>
        </div>
        
        <center><button onclick="location.reload()" style="background:none; border:none; color:var(--danger); margin-top:30px; font-weight:700; cursor:pointer">ENCERRAR SESSÃO</button></center>
    </section>
</div>

<script>
    const CHAVE_MESTRA = "1234";
    let fotosArray = [];
    let statusSelecionado = "Aguardando";
    let filtroAtual = "Todos";
    let bancoDados = JSON.parse(localStorage.getItem('oficina_lima_car')) || {};
    let editandoPlaca = null;

    function corrigirIA(input) {
        let t = input.value.trim();
        if (t) {
            t = t.charAt(0).toUpperCase() + t.slice(1);
            if (!/[.!?]$/.test(t)) t += ".";
            input.value = t;
        }
    }

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".",",");
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        i.value = v;
    }

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-painel') desenharTabela();
    }

    function logar() {
        if(document.getElementById('pass-admin').value === CHAVE_MESTRA) irPara('view-painel');
        else alert("Senha inválida!");
    }

    function setStatus(el) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        statusSelecionado = el.getAttribute('data-status');
    }

    function processarFotos(input) {
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => { fotosArray.push(e.target.result); renderPreview(); };
            reader.readAsDataURL(file);
        });
    }

    function renderPreview() {
        document.getElementById('preview-fotos').innerHTML = fotosArray.map((img, i) => `
            <div style="position:relative">
                <img src="${img}" class="foto-thumb">
                <div onclick="fotosArray.splice(${i},1);renderPreview()" style="position:absolute;top:0;right:0;background:red;color:white;width:18px;height:18px;border-radius:50%;text-align:center;cursor:pointer;font-size:12px">×</div>
            </div>
        `).join('');
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('m-modelo').value.trim();
        const preco = document.getElementById('m-preco').value.trim();
        const obs = document.getElementById('m-obs').value.trim();

        // VALIDAÇÃO TOTAL PERSONALIZADA
        if(!placa) return alert("LIMA CAR INFORMA: O campo PLACA não pode ficar vazio.");
        if(placa.length < 7) return alert("LIMA CAR INFORMA: Placa inválida. Digite os 7 caracteres.");
        if(!modelo) return alert("LIMA CAR INFORMA: Por favor, descreva o MODELO do veículo.");
        if(!preco || preco === "0,00") return alert("LIMA CAR INFORMA: Defina um VALOR para o serviço (ou use 0,00 para orçamento).");
        if(!obs) return alert("LIMA CAR INFORMA: O RELATÓRIO TÉCNICO é obrigatório para o cliente.");
        if(fotosArray.length === 0) return alert("LIMA CAR INFORMA: Adicione ao menos uma FOTO do veículo.");

        if(!editandoPlaca && bancoDados[placa]) return alert("LIMA CAR INFORMA: Esta placa já possui um cadastro ativo.");

        bancoDados[placa] = { modelo, status: statusSelecionado, preco, obs, fotos: [...fotosArray], data: new Date().toLocaleString() };
        localStorage.setItem('oficina_lima_car', JSON.stringify(bancoDados));
        alert("Veículo salvo com sucesso na Lima Car!");
        limparFormulario();
        desenharTabela();
    }

    function avisarWhats(placa) {
        const v = bancoDados[placa];
        const msg = `Olá! A Mecânica Lima Car informa: Seu veículo (${v.modelo}) de placa ${placa} está com o status: ${v.status.toUpperCase()}.`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
    }

    function excluir(p) {
        if(confirm(`Lima Car: Deseja realmente excluir permanentemente a placa ${p}?`)) {
            delete bancoDados[p];
            localStorage.setItem('oficina_lima_car', JSON.stringify(bancoDados));
            desenharTabela();
        }
    }

    function desenharTabela() {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).reverse().forEach(p => {
            const v = bancoDados[p];
            if(filtroAtual !== 'Todos' && v.status !== filtroAtual) return;
            corpo.innerHTML += `
                <tr>
                    <td><b>${p}</b><br><span style="font-size:10px">${v.modelo}</span></td>
                    <td style="color:var(--primary)">${v.status}</td>
                    <td style="text-align:right">
                        <button class="btn-whats" onclick="avisarWhats('${p}')">Zap</button>
                        <button style="background:none;border:none;color:white;margin-left:5px" onclick="prepararEdicao('${p}')">✏️</button>
                        <button style="background:none;border:none;color:red;margin-left:5px" onclick="excluir('${p}')">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    function filtrarTabela(s, el) {
        filtroAtual = s;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        desenharTabela();
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        editandoPlaca = p;
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco;
        document.getElementById('m-obs').value = v.obs;
        fotosArray = [...v.fotos];
        renderPreview();
        document.getElementById('btn-cancelar').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function limparFormulario() {
        editandoPlaca = null;
        ['m-placa','m-modelo','m-preco','m-obs'].forEach(id => document.getElementById(id).value = "");
        fotosArray = [];
        renderPreview();
        document.getElementById('btn-cancelar').classList.add('hidden');
    }

    function consultarCarro() {
        const p = document.getElementById('login-placa').value.toUpperCase();
        const res = document.getElementById('resultado-cliente');
        if(!p) return alert("Por favor, digite a placa.");
        if(bancoDados[p]) {
            const v = bancoDados[p];
            res.innerHTML = `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-top:20px; border-left:4px solid var(--primary)">
                    <img src="https://i.imgur.com/vHq0A6v.jpeg" style="width:80px; margin-bottom:10px">
                    <h3 style="color:var(--primary)">${v.modelo}</h3>
                    <p style="font-size:12px">Status: <b style="color:var(--success)">${v.status.toUpperCase()}</b></p>
                    <div class="foto-preview-container" style="margin-top:10px">
                        ${v.fotos.map(f => `<img src="${f}" class="foto-thumb" onclick="document.getElementById('img-ampliada').src='${f}';document.getElementById('modal-imagem').style.display='flex'">`).join('')}
                    </div>
                    <p style="margin-top:10px; font-size:14px">${v.obs}</p>
                    <p style="color:var(--primary); font-weight:bold; margin-top:10px">Valor: R$ ${v.preco}</p>
                    <small style="color:gray; font-size:10px">Atualizado em: ${v.data}</small>
                </div>`;
        } else {
            alert("Veículo não localizado em nosso pátio.");
        }
    }
</script>
</body>
</html>
