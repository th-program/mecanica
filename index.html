<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mecânica High-Tech | Professional Suite</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --card-bg: #161618;
            --primary: #ff6b00;
            --primary-glow: rgba(255, 107, 0, 0.2);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #2d2d2d;
            --success: #00e676;
            --warning: #ffd600;
            --danger: #ff4444;
            --info: #0091ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 550px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 35px 25px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            width: 100%;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #1e1e21;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff;
            font-size: 15px !important;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .input-placa-grande {
            font-size: 26px !important;
            font-weight: 900;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            border: 2px solid var(--border);
        }

        /* Categorias/Filtros no Painel */
        .categorias-vagas {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .cat-btn {
            padding: 10px 15px;
            border-radius: 12px;
            background: #222;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            text-transform: uppercase;
        }
        .cat-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .status-picker {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .status-option {
            background: #222;
            border: 1px solid var(--border);
            padding: 10px 2px;
            border-radius: 10px;
            text-align: center;
            font-size: 9px;
            font-weight: 800;
            cursor: pointer;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .status-option.active[data-status="Aguardando"] { background: #333; color: #fff; border-color: #fff; }
        .status-option.active[data-status="Trabalhando"] { background: rgba(255, 214, 0, 0.15); color: var(--warning); border-color: var(--warning); }
        .status-option.active[data-status="Pronto"] { background: rgba(0, 230, 118, 0.15); color: var(--success); border-color: var(--success); }

        .btn-main {
            background: var(--primary);
            color: #fff;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 14px;
        }

        .foto-preview-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .foto-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        #modal-imagem {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        #modal-imagem img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            object-fit: contain;
        }

        .table-container { margin-top: 20px; border-top: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; font-size: 12px; }
        
        .btn-del { background: #ff444422; border: 1px solid #ff444444; color: #ff4444; padding: 6px; border-radius: 6px; cursor: pointer; }
        .btn-edit { background: #0091ff22; border: 1px solid #0091ff44; color: #0091ff; padding: 6px; border-radius: 6px; cursor: pointer; margin-right: 5px;}

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="modal-imagem" onclick="this.style.display='none'">
    <img src="" id="img-ampliada">
</div>

<div class="container">
    <section id="view-cliente" class="card">
        <h2>Consultar Veículo</h2>
        <label>Número da Placa</label>
        <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" oninput="this.value = this.value.toUpperCase()">
        <button class="btn-main" onclick="consultarCarro()">Rastrear Agora</button>
        <div id="resultado-cliente"></div>
        <center>
            <button onclick="irPara('view-login')" style="background:none; border:none; color:#555; margin-top:40px; font-size:10px; cursor:pointer; font-weight:700;">ACESSO TÉCNICO OFICINA</button>
        </center>
    </section>

    <section id="view-login" class="card hidden">
        <h2>Acesso Administrativo</h2>
        <label>Senha de Segurança</label>
        <input type="password" id="pass-admin" style="text-align:center; font-size:22px !important">
        <button class="btn-main" onclick="logar()">Entrar no Sistema</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer">Voltar</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <h2 id="titulo-painel">Gestão de Pátio</h2>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div>
                <label>Placa</label>
                <input type="text" id="m-placa" maxlength="7" style="text-transform:uppercase; font-weight:700" oninput="this.value = this.value.toUpperCase()">
            </div>
            <div>
                <label>Valor (R$)</label>
                <input type="text" id="m-preco" oninput="mascaraMoeda(this)">
            </div>
        </div>

        <label>Modelo do Carro</label>
        <input type="text" id="m-modelo" oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1)">

        <label>Status do Trabalho</label>
        <div class="status-picker">
            <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Aguardando</div>
            <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Em Serviço</div>
            <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Finalizado</div>
        </div>

        <label>Fotos do Veículo</label>
        <div style="background:#252529; border:2px dashed var(--border); padding:15px; border-radius:16px; text-align:center; cursor:pointer; margin-bottom:15px" onclick="document.getElementById('m-foto').click()">
            📸 Adicionar Fotos
            <input type="file" id="m-foto" hidden accept="image/*" multiple onchange="processarFotos(this)">
        </div>
        <div id="preview-fotos" class="foto-preview-container"></div>

        <label>Relatório Técnico</label>
        <textarea id="m-obs" rows="3" onblur="corrigirIA(this)"></textarea>
        
        <button class="btn-main" id="btn-salvar" onclick="salvar()">Salvar no Banco de Dados</button>
        <button class="btn-main hidden" id="btn-cancelar" onclick="limparFormulario()" style="background:#333; margin-top:10px">Cancelar Edição</button>

        <h2 style="margin-top:30px; font-size: 0.9rem;">Filtrar Pátio por Categoria</h2>
        <div class="categorias-vagas">
            <div class="cat-btn active" onclick="filtrarTabela('Todos', this)">Todos</div>
            <div class="cat-btn" onclick="filtrarTabela('Aguardando', this)">Aguardando</div>
            <div class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">Em Serviço</div>
            <div class="cat-btn" onclick="filtrarTabela('Pronto', this)">Finalizados</div>
        </div>

        <div class="table-container">
            <table id="corpo-tabela"></table>
        </div>
        
        <center><button onclick="location.reload()" style="background:none; border:none; color:var(--danger); margin-top:30px; font-weight:700; cursor:pointer">ENCERRAR SESSÃO</button></center>
    </section>
</div>

<script>
    const CHAVE_MESTRA = "1234";
    let fotosArray = [];
    let statusSelecionado = "Aguardando";
    let filtroAtual = "Todos";
    let bancoDados = JSON.parse(localStorage.getItem('oficina_pro_v14')) || {};
    let editandoPlaca = null;

    // --- IA RULES & FORMATADORES ---
    function corrigirIA(input) {
        let texto = input.value.trim();
        if (texto.length > 0) {
            texto = texto.charAt(0).toUpperCase() + texto.slice(1);
            if (!/[.!?]$/.test(texto)) texto += ".";
            input.value = texto;
        }
    }

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".",",");
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        i.value = v;
    }

    // --- TECLADO ---
    window.addEventListener('keydown', (e) => {
        if(e.key === "Enter") {
            if(!document.getElementById('view-cliente').classList.contains('hidden')) consultarCarro();
            else if(!document.getElementById('view-login').classList.contains('hidden')) logar();
        }
        if(e.key === "Escape") document.getElementById('modal-imagem').style.display = 'none';
    });

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-painel') desenharTabela();
    }

    function logar() {
        const senha = document.getElementById('pass-admin').value;
        if(senha === CHAVE_MESTRA) irPara('view-painel');
        else alert("⚠️ Senha incorreta!");
    }

    function setStatus(el) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        statusSelecionado = el.getAttribute('data-status');
    }

    function processarFotos(input) {
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => { fotosArray.push(e.target.result); renderPreview(); };
            reader.readAsDataURL(file);
        });
    }

    function renderPreview() {
        const container = document.getElementById('preview-fotos');
        container.innerHTML = fotosArray.map((img, index) => `
            <div style="position:relative">
                <img src="${img}" class="foto-thumb" onclick="abrirZoom('${img}')">
                <div onclick="removerFoto(${index})" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:20px; height:20px; text-align:center; cursor:pointer; font-size:12px">×</div>
            </div>
        `).join('');
    }

    function removerFoto(index) {
        fotosArray.splice(index, 1);
        renderPreview();
    }

    function abrirZoom(src) {
        document.getElementById('img-ampliada').src = src;
        document.getElementById('modal-imagem').style.display = 'flex';
    }

    function filtrarTabela(status, el) {
        filtroAtual = status;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        desenharTabela();
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('m-modelo').value.trim();
        const preco = document.getElementById('m-preco').value.trim();
        const obs = document.getElementById('m-obs').value.trim();

        // Validação Total
        if(!placa) return alert("⚠️ Falta a PLACA!");
        if(!modelo) return alert("⚠️ Falta o MODELO!");
        if(!preco) return alert("⚠️ Falta o VALOR!");
        if(!obs) return alert("⚠️ Falta o RELATÓRIO!");
        if(fotosArray.length === 0) return alert("⚠️ Adicione ao menos uma foto!");

        if(!editandoPlaca && bancoDados[placa]) return alert("❌ Já existe um cadastro com esta placa!");

        const statusAnterior = editandoPlaca ? bancoDados[editandoPlaca].status : null;

        bancoDados[placa] = {
            modelo: modelo,
            status: statusSelecionado,
            preco: preco,
            obs: obs,
            fotos: fotosArray,
            data: new Date().toLocaleString('pt-BR')
        };

        if (statusAnterior !== statusSelecionado) avisarWhatsApp(placa, statusSelecionado);

        localStorage.setItem('oficina_pro_v14', JSON.stringify(bancoDados));
        alert("✅ Salvo!");
        limparFormulario();
        desenharTabela();
    }

    function avisarWhatsApp(placa, status) {
        let msg = "";
        if(status === "Pronto") msg = `Seu carro (${placa}) está PRONTO!`;
        if(status === "Trabalhando") msg = `Iniciamos o SERVIÇO no seu carro (${placa}).`;
        if(msg && confirm("Deseja avisar o cliente no WhatsApp?")) {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`);
        }
    }

    function desenharTabela() {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        const keys = Object.keys(bancoDados).reverse();
        
        keys.forEach(p => {
            const v = bancoDados[p];
            if(filtroAtual !== "Todos" && v.status !== filtroAtual) return;

            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#777");
            corpo.innerHTML += `
                <tr>
                    <td><b>${p}</b><br><span style="color:#666">${v.modelo}</span></td>
                    <td style="color:${cor}; font-weight:bold; font-size:9px">${v.status.toUpperCase()}</td>
                    <td style="text-align:right">
                        <button class="btn-edit" onclick="prepararEdicao('${p}')">Editar</button>
                        <button class="btn-del" onclick="excluir('${p}')">Excluir</button>
                    </td>
                </tr>`;
        });
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        editandoPlaca = p;
        document.getElementById('m-placa').value = p;
        document.getElementById('m-placa').disabled = true;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco;
        document.getElementById('m-obs').value = v.obs;
        fotosArray = [...v.fotos];
        renderPreview();
        document.getElementById('btn-salvar').innerText = "Atualizar";
        document.getElementById('btn-cancelar').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function limparFormulario() {
        editandoPlaca = null;
        document.getElementById('m-placa').disabled = false;
        document.getElementById('m-placa').value = "";
        document.getElementById('m-modelo').value = "";
        document.getElementById('m-preco').value = "";
        document.getElementById('m-obs').value = "";
        fotosArray = [];
        renderPreview();
        document.getElementById('btn-salvar').innerText = "Salvar no Banco";
        document.getElementById('btn-cancelar').classList.add('hidden');
    }

    function excluir(p) {
        let resp = prompt(`Tem certeza que deseja EXCLUIR a placa ${p}? Digite SIM para confirmar.`);
        if(resp && resp.toUpperCase() === "SIM") {
            delete bancoDados[p];
            localStorage.setItem('oficina_pro_v14', JSON.stringify(bancoDados));
            desenharTabela();
        }
    }

    function consultarCarro() {
        const placa = document.getElementById('login-placa').value.toUpperCase().trim();
        const res = document.getElementById('resultado-cliente');
        if(!placa) return alert("⚠️ Digite a placa!");

        if(bancoDados[placa]) {
            const p = bancoDados[placa];
            const cor = p.status === "Pronto" ? "var(--success)" : (p.status === "Trabalhando" ? "var(--warning)" : "#a0a0a0");
            res.innerHTML = `
                <div style="background:#111; border-radius:24px; padding:20px; margin-top:25px; border:1px solid #333;">
                    <h3 style="color:var(--primary); margin-bottom:5px">${p.modelo}</h3>
                    <div style="margin-bottom:15px">
                        <div style="display:inline-block; padding:5px 12px; border-radius:50px; background:${cor}; color:#000; font-weight:900; font-size:10px">${p.status.toUpperCase()}</div>
                    </div>
                    <div class="foto-preview-container">
                        ${p.fotos.map(f => `<img src="${f}" class="foto-thumb" onclick="abrirZoom('${f}')">`).join('')}
                    </div>
                    <p style="color:#ccc; font-size:13px; background:#1a1a1d; padding:12px; border-radius:12px; margin-top:10px">${p.obs}</p>
                    <div style="margin-top:15px">
                        <label>Valor do Serviço</label>
                        <p style="color:var(--success); font-weight:800; font-size:18px">R$ ${p.preco}</p>
                    </div>
                </div>
            `;
        } else {
            alert("❌ Placa não encontrada!");
        }
    }
</script>
</body>
</html>
