<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mecânica Lima Car | Gestão Profissional</title>
    <style>
        :root {
            --bg: #000b1a; 
            --card-bg: rgba(0, 21, 43, 0.9); 
            --primary: #d4af37; 
            --text-main: #f0f0f0; 
            --text-dim: #a0aec0; 
            --border: #132a47;
            --success: #00ff88; 
            --warning: #ffcc00; 
            --danger: #ff4d4d;
            --input-bg: rgba(0, 30, 61, 0.7);
            --logo-size: 220px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 15px; overflow-x: hidden;
        }

        /* Estrutura de Layout Dinâmico */
        .container { width: 100%; max-width: 450px; transition: max-width 0.5s ease; }
        
        /* Quando estiver no Painel do Mecânico no PC, a largura aumenta */
        body:has(#view-painel:not(.hidden)) .container {
            max-width: 1100px;
        }

        section { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg); 
            border: 1px solid var(--border);
            border-radius: 25px; padding: 25px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-top: 2px solid var(--primary);
        }

        /* Layout Horizontal para PC (Painel do Mecânico) */
        @media (min-width: 900px) {
            .painel-grid {
                display: flex;
                gap: 25px;
                align-items: flex-start;
            }
            .col-form { flex: 1; position: sticky; top: 20px; }
            .col-lista { flex: 1.2; }
        }

        .logo-box {
            text-align: center; margin: -25px -25px 20px -25px;
            background: #000; border-bottom: 2px solid var(--primary);
            border-radius: 24px 24px 0 0; padding: 15px;
        }
        .logo-img { width: 100%; max-width: var(--logo-size); height: auto; display: block; margin: 0 auto; }

        label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea, select {
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 10px; color: #fff; font-size: 15px !important; margin-bottom: 12px; transition: 0.3s;
        }

        /* Botão de Upload Customizado */
        .btn-upload-custom {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px dashed var(--primary);
            color: var(--primary); padding: 15px; border-radius: 12px;
            cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 12px;
            transition: 0.3s; text-align: center;
        }
        input[type="file"] { display: none; }

        .input-placa-grande { 
            font-family: 'Monaco', monospace;
            font-size: 32px !important; background: #fff !important; color: #000 !important; 
            border: 5px solid #333 !important; text-transform: uppercase; letter-spacing: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2); text-align: center;
        }

        .btn-main {
            background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); 
            color: #000; width: 100%; padding: 15px;
            border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }

        /* Filtros Temáticos */
        .categorias-filtro { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .cat-btn {
            background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-dim); padding: 10px 15px; border-radius: 10px;
            font-size: 11px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.1); }

        .status-picker { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .status-option {
            background: rgba(0, 30, 61, 0.5); border: 1px solid var(--border); padding: 10px 2px;
            border-radius: 10px; text-align: center; font-size: 9px; font-weight: 800;
            cursor: pointer; color: var(--text-dim); transition: 0.3s;
        }
        .status-option.active { transform: scale(1.05); border-color: var(--primary); color: #fff; }

        /* Galeria e Modal */
        #img-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 99999;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        #modal-view { max-width: 90%; max-height: 80%; border: 2px solid var(--primary); border-radius: 10px; }

        .fotos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 10px; }
        .img-item { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }

        .table-container { background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .hidden { display: none !important; }
        #custom-alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000;
            padding: 15px 25px; border-radius: 12px; background: var(--danger); color: white;
            font-size: 14px; font-weight: 800; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="custom-alert"></div>

<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-view" src="">
</div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box">
            <img src="logo/logo.png" class="logo-img">
        </div>
        <label>Consulte seu veículo</label>
        <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1D23">
        <button class="btn-main" onclick="consultarCarro()">Localizar Veículo</button>
        <div id="resultado-cliente"></div>
        <center>
            <button onclick="irPara('view-login')" style="background:none; border:none; color:var(--text-dim); margin-top:30px; font-size:10px; cursor:pointer;">🔒 ACESSO RESTRITO</button>
        </center>
    </section>

    <section id="view-login" class="card hidden">
        <label>Chave de Acesso</label>
        <input type="password" id="pass-admin" style="text-align:center; font-size:20px;">
        <button class="btn-main" onclick="logar()">Entrar</button>
        <center><button onclick="irPara('view-cliente')" style="background:none; border:none; color:var(--text-dim); margin-top:15px; cursor:pointer;">Voltar</button></center>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:14px; color:var(--primary)">SISTEMA DE GESTÃO LIMA CAR</h2>
            <button onclick="location.reload()" style="background:var(--danger); border:none; color:#fff; padding:5px 10px; border-radius:5px; font-size:10px;">SAIR</button>
        </div>

        <div class="painel-grid">
            
            <div class="col-form">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <div><label>Placa</label><input type="text" id="m-placa" maxlength="7"></div>
                    <div><label>Valor (R$)</label><input type="text" id="m-preco" oninput="mascaraMoeda(this)"></div>
                </div>
                <label>Modelo do Veículo</label>
                <input type="text" id="m-modelo" placeholder="Ex: Gol G5">
                
                <label>Fotos do Serviço</label>
                <label for="m-fotos-input" class="btn-upload-custom" id="label-upload">📸 ADICIONAR FOTOS</label>
                <input type="file" id="m-fotos-input" accept="image/*" multiple onchange="previewImages()">
                <div id="preview-area" class="fotos-grid" style="margin-bottom:15px"></div>

                <label>Status</label>
                <div class="status-picker">
                    <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Espera</div>
                    <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Oficina</div>
                    <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Pronto</div>
                </div>

                <label>Relatório</label>
                <textarea id="m-obs" rows="3"></textarea>

                <button class="btn-main" onclick="salvar()">Salvar Registro</button>
                <button id="btn-cancelar" class="hidden" onclick="limparFormulario()" style="width:100%; margin-top:10px; background:#333; color:#fff; border:none; padding:10px; border-radius:10px;">Cancelar Edição</button>
            </div>

            <div class="col-lista">
                <div class="categorias-filtro">
                    <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">Todos</button>
                    <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">Espera</button>
                    <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">Oficina</button>
                    <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">Prontos</button>
                </div>
                <div class="table-container">
                    <table id="corpo-tabela"></table>
                </div>
            </div>

        </div>
    </section>
</div>

<script>
    const CHAVE_MESTRA = "1234";
    let statusSelecionado = "Aguardando";
    let bancoDados = JSON.parse(localStorage.getItem('lima_car_db')) || {};
    let editandoPlaca = null;
    let fotosBase64 = [];

    function showAlert(msg) {
        const div = document.getElementById('custom-alert');
        div.innerText = msg; div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 2000);
    }

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        i.value = v;
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        const area = document.getElementById('preview-area');
        area.innerHTML = ""; fotosBase64 = [];
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = "img-item";
                area.appendChild(img);
                fotosBase64.push(e.target.result);
            };
            reader.readAsDataURL(file);
        });
        document.getElementById('label-upload').innerText = files.length + " FOTOS CARREGADAS";
    }

    function abrirImg(src) {
        document.getElementById('modal-view').src = src;
        document.getElementById('img-modal').style.display = 'flex';
    }

    function irPara(id) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-painel') desenharTabela();
    }

    function logar() {
        if(document.getElementById('pass-admin').value === CHAVE_MESTRA) irPara('view-painel');
        else showAlert("Senha incorreta");
    }

    function setStatus(el) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        statusSelecionado = el.getAttribute('data-status');
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase().trim();
        const modelo = document.getElementById('m-modelo').value;
        const preco = document.getElementById('m-preco').value;
        const obs = document.getElementById('m-obs').value;

        if(!placa || !modelo) return showAlert("Preencha Placa e Modelo");

        bancoDados[placa] = {
            modelo, preco, obs, status: statusSelecionado,
            fotos: fotosBase64.length > 0 ? fotosBase64 : (editandoPlaca ? bancoDados[placa].fotos : [])
        };

        localStorage.setItem('lima_car_db', JSON.stringify(bancoDados));
        showAlert("Salvo com sucesso!");
        limparFormulario();
        desenharTabela();
    }

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        Object.keys(bancoDados).reverse().forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            const cor = v.status === "Pronto" ? "var(--success)" : (v.status === "Trabalhando" ? "var(--warning)" : "#fff");
            corpo.innerHTML += `<tr>
                <td><b>${p}</b><br><small>${v.modelo}</small></td>
                <td style="color:${cor}">${v.status}</td>
                <td style="text-align:right">
                    <button onclick="prepararEdicao('${p}')" style="background:none; border:none; color:#fff; cursor:pointer">✏️</button>
                    <button onclick="excluir('${p}')" style="background:none; border:none; color:var(--danger); margin-left:10px; cursor:pointer">🗑️</button>
                </td>
            </tr>`;
        });
    }

    function filtrarTabela(status, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        desenharTabela(status);
    }

    function consultarCarro() {
        const p = document.getElementById('login-placa').value.toUpperCase().trim();
        const res = document.getElementById('resultado-cliente');
        if(bancoDados[p]) {
            const v = bancoDados[p];
            res.innerHTML = `
                <div class="card" style="margin-top:20px; border-top: 2px solid var(--primary);">
                    <h3>${v.modelo}</h3>
                    <p>Status: <b style="color:var(--warning)">${v.status}</b></p>
                    <p>Valor: R$ ${v.preco}</p>
                    <p style="font-size:12px; margin-top:10px">${v.obs}</p>
                    <div class="fotos-grid">
                        ${v.fotos.map(f => `<img src="${f}" class="img-item" onclick="abrirImg('${f}')">`).join('')}
                    </div>
                </div>
            `;
        } else {
            showAlert("Placa não encontrada");
        }
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        editandoPlaca = p;
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo;
        document.getElementById('m-preco').value = v.preco;
        document.getElementById('m-obs').value = v.obs;
        document.getElementById('btn-cancelar').classList.remove('hidden');
    }

    function excluir(p) {
        if(confirm("Deseja excluir?")) {
            delete bancoDados[p];
            localStorage.setItem('lima_car_db', JSON.stringify(bancoDados));
            desenharTabela();
        }
    }

    function limparFormulario() {
        editandoPlaca = null;
        document.querySelectorAll('.col-form input, .col-form textarea').forEach(i => i.value = "");
        document.getElementById('preview-area').innerHTML = "";
        document.getElementById('btn-cancelar').classList.add('hidden');
        document.getElementById('label-upload').innerText = "📸 ADICIONAR FOTOS";
    }
</script>
</body>
</html>
